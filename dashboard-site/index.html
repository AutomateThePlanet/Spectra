<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRA Dashboard</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>SPECTRA Dashboard</h1>
            <nav class="nav">
                <button class="nav-btn active" data-view="suites">Suites</button>
                <button class="nav-btn" data-view="tests">Tests</button>
                <button class="nav-btn" data-view="runs">Run History</button>
                <button class="nav-btn" data-view="coverage">Coverage</button>
            </nav>
        </header>
        <main class="main">
            <aside class="sidebar">
                <div class="filters">
                    <h3>Filters</h3>
                    <div class="filter-group">
                        <label for="filter-priority">Priority</label>
                        <select id="filter-priority">
                            <option value="">All</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filter-component">Component</label>
                        <select id="filter-component">
                            <option value="">All</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filter-search">Search</label>
                        <input type="text" id="filter-search" placeholder="Search by ID or title...">
                    </div>
                    <div class="filter-group">
                        <label>Tags</label>
                        <div id="filter-tags" class="tag-filter">
                            <!-- Populated by JavaScript -->
                        </div>
                    </div>
                </div>
                <div class="summary" id="summary">
                    <!-- Summary stats rendered by JavaScript -->
                </div>
            </aside>
            <section class="content" id="content">
                <!-- Dynamic content loaded by JavaScript -->
            </section>
        </main>
        <footer class="footer">
            <span>Generated by SPECTRA</span>
            <span id="generated-at"></span>
        </footer>
    </div>

    <script id="dashboard-data" type="application/json">
    {{DASHBOARD_DATA}}
    </script>

    <!-- D3.js for coverage visualization -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="scripts/app.js"></script>
    <script src="scripts/coverage-map.js"></script>
</body>
</html>
