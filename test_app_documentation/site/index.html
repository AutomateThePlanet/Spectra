    <div id="app">

                        <label>Tags</label>

                        </div>
                    </div>
                </div>
                <div class="summary" id="summary">

            </aside>
            <section class="content" id="content">

            </section>

haracter limits (\u003E160 Latin or \u003E70 Cyrillic)","Trigger a notification event that uses this template (e.g., payment received with long service name)","Check the SMS received on the citizen\u0027s registered phone number","Verify the SMS content is truncated","Verify the truncated message ends with \u0027...\u0027 and includes a link to the full notification in the portal"],"expected_result":"SMS message is truncated to 160 characters (Latin) or 70 characters (Cyrillic). The truncated message ends with \u0027...\u0027 followed by a link to view the full notification in the portal.","test_data":"Notification template with content exceeding character limits"},{"test_id":"TC-102","title":"Verify notification preferences take effect immediately after change","status":"Passed","attempt":1,"duration_ms":15173,"preconditions":"Citizen is logged in with all notification channels enabled by default.","steps":["Navigate to notification preferences page","Disable email notifications for a specific category (e.g., \u0027Application status change\u0027)","Save the preference changes","Trigger an application status change event immediately","Check email inbox and in-app notifications","Verify email is NOT received but in-app notification is still delivered"],"expected_result":"Preference changes take effect immediately. No email notification is sent for the disabled category. In-app notification is still delivered as it cannot be disabled. Notifications already queued before the preference change are still sent.","test_data":"Valid citizen account with active application"},{"test_id":"TC-103","title":"Verify notification retry logic with exponential backoff for failed email","status":"Failed","attempt":1,"duration_ms":35349,"notes":"Something else is also happening.","preconditions":"Email service is configured to simulate failures. A notification event is ready to be triggered.","steps":["Configure email service to fail on first 3 attempts","Trigger a notification event that sends an email (e.g., application submitted)","Monitor retry attempts and delays","Verify 1st retry occurs after 1 minute","Verify 2nd retry occurs after 5 minutes from 1st retry","Verify 3rd retry occurs after 30 minutes from 2nd retry","Allow email service to succeed on 4th attempt","Verify email is successfully delivered"],"expected_result":"Failed email notifications are retried with exponential backoff: 1st retry after 1 minute, 2nd after 5 minutes, 3rd after 30 minutes, 4th after 2 hours, 5th after 12 hours. Email is marked as DELIVERED after successful retry. Retry delays match documented schedule.","test_data":"Email service with simulated failures"},{"test_id":"TC-104","title":"Verify rate limiting blocks non-critical notifications when limit exceeded","status":"Passed","attempt":1,"duration_ms":12980,"preconditions":"Citizen account is registered. Multiple notification events can be triggered rapidly.","steps":["Trigger 10 email notifications within one hour for the same citizen (e.g., multiple application status changes)","Verify all 10 emails are delivered","Trigger an 11th non-critical email notification within the same hour","Check email inbox","Verify the 11th email is NOT immediately delivered","Wait for the next available window (after 1 hour from first email)","Verify the queued email is now delivered"],"expected_result":"Rate limiting enforces maximum 10 emails per hour per citizen. The 11th non-critical email is queued and delivered in the next available window. Critical notifications (password reset, account locked) would bypass rate limits.","test_data":"Citizen account with multiple notification triggers"},{"test_id":"TC-105","title":"Verify critical notifications bypass Do Not Disturb mode","status":"Failed","attempt":1,"duration_ms":28791,"notes":"Something bad happened during execution.","preconditions":"Citizen has enabled Do Not Disturb mode with scheduled hours (e.g., 22:00-08:00). Current time is within DND window.","steps":["Log in as citizen and enable Do Not Disturb mode","Set DND schedule to suppress notifications during current time window","Trigger a non-critical notification (e.g., application status change)","Verify push and SMS notifications are suppressed","Trigger a critical notification (e.g., password reset or account locked)","Check all notification channels (email, SMS, push, in-app)","Verify critical notification is delivered on all applicable channels despite DND mode"],"expected_result":"Non-critical notifications are suppressed during DND mode (no push/SMS). Critical notifications (password reset, account locked) bypass DND mode and are delivered on all applicable channels. Email and in-app notifications are delivered but without sound/vibration on mobile during DND.","test_data":"Citizen account with DND enabled and scheduled"}],"report_path":".execution/reports/83c18753-5779-489d-8eab-2b13c3f23cc1.html"},{"run_id":"9b1ab65a-1eba-4b37-a0c4-34daa762647e","suite":"refunds","status":"completed","started_at":"2026-03-21T09:30:32.2756507Z","completed_at":"2026-03-21T09:32:57.9244678Z","started_by":"Anton Angelov","duration_seconds":145,"total":6,"passed":3,"failed":2,"skipped":0,"blocked":1,"results":[{"test_id":"TC-100","title":"Refund card payment after application rejection","status":"Passed","attempt":1,"duration_ms":14321,"preconditions":"Citizen has submitted an application with card payment (Visa/Mastercard) that has been rejected by administration","steps":["Log in as administrator with payments.refund permission","Navigate to the rejected application","Click \u0027Process Refund\u0027 button","Verify refund method is set to \u0027Original Card\u0027 (last 4 digits displayed)","Confirm refund amount matches original payment","Submit refund request","Verify refund status changes to \u0027Processing\u0027","Verify citizen receives email notification about refund"],"expected_result":"Refund is processed back to the original card. System displays message \u0027Refund will be processed within 5-10 business days\u0027. Payment status changes to REFUNDED. Refund transaction is logged in audit trail.","test_data":"Application with card payment: 50.00 BGN, Card ending in 1234"},{"test_id":"TC-101","title":"Refund bank transfer payment for cancelled service within 24 hours","status":"Failed","attempt":1,"duration_ms":24743,"notes":"Something bad happened during the test execution.","preconditions":"Citizen has paid via bank transfer and wants to cancel service within 24 hours of payment","steps":["Log in as citizen who made bank transfer payment","Navigate to \u0027My Applications\u0027 dashboard","Select the paid application (within 24 hours of payment)","Click \u0027Cancel Application\u0027 button","System prompts for IBAN for refund","Enter valid IBAN (BG80BNBG96611020345678)","Confirm cancellation and refund request","Verify application status changes to \u0027Cancelled\u0027","Verify refund request is created with status \u0027Pending\u0027"],"expected_result":"Refund is processed to the provided IBAN. System displays message \u0027Refund will be processed within 3-5 business days\u0027. Citizen receives confirmation email with refund details. Payment status changes to REFUNDED.","test_data":"Bank transfer payment: 5.00 BGN, Payment reference: PR-20260320-123456"},{"test_id":"TC-102","title":"Partial refund for expedited fee only","status":"Passed","attempt":1,"duration_ms":17538,"preconditions":"Application was paid with expedited fee but will be processed as standard service","steps":["Log in as administrator with payments.refund permission","Navigate to application with expedited fee payment (e.g., Certificate of Birth: 5.00 BGN base \u002B 15.00 BGN expedited = 20.00 BGN total)","Select \u0027Process Partial Refund\u0027","Enter refund amount: 15.00 BGN","Enter reason: \u0027Expedited processing not available, refunding expedited fee\u0027","Verify system shows breakdown: Original: 20.00 BGN, Refund: 15.00 BGN, Retained: 5.00 BGN","Confirm partial refund","Verify payment status shows \u0027Partially Refunded\u0027"],"expected_result":"Partial refund of 15.00 BGN is processed. Payment record shows original amount (20.00 BGN), refunded amount (15.00 BGN), and net amount (5.00 BGN). Citizen receives email with partial refund details. Application continues processing with standard fee.","test_data":"Card payment: 20.00 BGN (5.00 base \u002B 15.00 expedited), Card ending in 5678"},{"test_id":"TC-103","title":"Refund voucher payment as credit note","status":"Failed","attempt":1,"duration_ms":25221,"notes":"A critical issue occurred, and the test is still not working as expected.","preconditions":"Citizen has paid via ePay/EasyPay voucher and application is rejected","steps":["Log in as administrator with payments.refund permission","Navigate to rejected application paid with voucher","Click \u0027Process Refund\u0027","Verify refund method shows \u0027Credit Note\u0027","Confirm refund amount matches original payment","Submit refund request","Verify credit note is generated with unique code","Verify credit note validity period is 12 months from issue date","Verify citizen receives email with credit note code and instructions"],"expected_result":"Credit note is issued with 12-month validity. Credit note code is displayed (format: CN-YYYYMMDD-XXXXXX). Citizen can use credit note for any future service. Payment status changes to REFUNDED. Credit note details are stored in system.","test_data":"Voucher payment: 5.00 BGN, Voucher code: EP-20260320-789012"},{"test_id":"TC-104","title":"Reject refund request exceeding original payment amount","status":"Blocked","attempt":1,"duration_ms":30574,"notes":"Test blocked due to an emergent issue.","preconditions":"Application has been paid and is eligible for refund","steps":["Log in as administrator with payments.refund permission","Navigate to application with payment (e.g., 50.00 BGN)","Select \u0027Process Refund\u0027","Attempt to enter refund amount greater than original payment (e.g., 75.00 BGN)","Click \u0027Submit Refund\u0027","Observe system validation"],"expected_result":"System rejects the refund request with error message: \u0027Refund amount cannot exceed original payment amount of 50.00 BGN\u0027. Refund is not processed. Payment status remains unchanged. No refund transaction is created.","test_data":"Original payment: 50.00 BGN, Attempted refund: 75.00 BGN"},{"test_id":"TC-105","title":"Reject cash refund without original receipt","status":"Passed","attempt":1,"duration_ms":15255,"preconditions":"Application was paid in cash at government office and is now eligible for refund","steps":["Citizen visits government office to request cash refund","Clerk logs in with payments.refund permission","Clerk navigates to the application requiring refund","Clerk selects \u0027Process Cash Refund\u0027","System prompts for original receipt number","Clerk attempts to process refund without entering receipt number","Clerk clicks \u0027Submit Refund\u0027","Observe system validation"],"expected_result":"System rejects refund request with error: \u0027Original receipt number is required for cash refunds\u0027. Refund cannot be processed. Clerk must verify citizen has original receipt and enter receipt number to proceed. Payment status remains unchanged.","test_data":"Cash payment: 5.00 BGN, Receipt number: (not provided)"}],"report_path":".execution/reports/9b1ab65a-1eba-4b37-a0c4-34daa762647e.html"},{"run_id":"fake-d1c","suite":"search","status":"completed","started_at":"2026-03-20T12:00:00Z","completed_at":"2026-03-20T12:30:00Z","started_by":"agent","duration_seconds":1800,"total":6,"passed":5,"failed":1,"skipped":0,"blocked":0},{"run_id":"fake-d1b","suite":"refunds","status":"completed","started_at":"2026-03-20T11:00:00Z","completed_at":"2026-03-20T11:30:00Z","started_by":"agent","duration_seconds":1800,"total":6,"passed":4,"failed":2,"skipped":0,"blocked":0},{"run_id":"fake-d1a","suite":"notifications","status":"comple ","suite":"refunds","status":"completed","started_at":"2026-03-14T11:00:00Z","completed_at":"2026-03-14T11:30:00Z","started_by":"agent","duration_seconds":1800,"total":6,"passed":3,"failed":3,"skipped":0,"blocked":0},{"run_id":"fake-d7a","suite":"notifications","status":"completed","started_at":"2026-03-14T10:00:00Z","completed_at":"2026-03-14T10:30:00Z","started_by":"agent","duration_seconds":1800,"total":6,"passed":4,"failed":2,"skipped":0,"blocked":0}],"tests":[{"id":"TC-100","suite":"authentication","title":"Successful login with valid username and password","file":"TC-100.md","priority":"high","tags":["authentication","login","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Login-Methods"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Navigate to the login page","Enter valid email address in the username field","Enter correct password","Click the Login button"],"expected_result":"User is successfully authenticated and redirected to the dashboard. LOGIN_SUCCESS event is logged to audit trail with timestamp, user identifier, source IP, and user agent.","preconditions":"User account exists with valid credentials","content":"---\nid: TC-100\npriority: high\ntags:\n  - authentication\n  - login\n  - positive\ncomponent: authentication\nrequirements: [REQ-001]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Login-Methods\nestimated_duration: 3m\n---\n\n# Successful login with valid username and password\n\n## Preconditions\n\nUser account exists with valid credentials\n\n## Steps\n\n1. Navigate to the login page\n2. Enter valid email address in the username field\n3. Enter correct password\n4. Click the Login button\n\n## Expected Result\n\nUser is successfully authenticated and redirected to the dashboard. LOGIN_SUCCESS event is logged to audit trail with timestamp, user identifier, source IP, and user agent.\n\n## Test Data\n\nValid email and password meeting policy requirements\n"},{"id":"TC-101","suite":"authentication","title":"Login fails with incorrect password","file":"TC-101.md","priority":"high","tags":["authentication","login","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Navigate to the login page","Enter valid email address","Enter incorrect password","Click the Login button"],"expected_result":"Login fails with error message. LOGIN_FAILED event is logged to audit trail with failure reason. Failed attempt counter increments toward account lockout threshold.","preconditions":"User account exists","content":"---\nid: TC-101\npriority: high\ntags:\n  - authentication\n  - login\n  - negative\ncomponent: authentication\nrequirements: [REQ-005]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout\nestimated_duration: 3m\n---\n\n# Login fails with incorrect password\n\n## Preconditions\n\nUser account exists\n\n## Steps\n\n1. Navigate to the login page\n2. Enter valid email address\n3. Enter incorrect password\n4. Click the Login button\n\n## Expected Result\n\nLogin fails with error message. LOGIN_FAILED event is logged to audit trail with failure reason. Failed attempt counter increments toward account lockout threshold.\n\n## Test Data\n\nValid email, incorrect password\n"},{"id":"TC-102","suite":"authentication","title":"Login fails with non-existent username","file":"TC-102.md","priority":"medium","tags":["authentication","login","negative","security"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Navigate to the login page","Enter non-existent email address","Enter any password","Click the Login button"],"expected_result":"Login fails with generic error message that does not reveal whether the account exists. LOGIN_FAILED event is logged with user identifier as \u0027unknown\u0027.","preconditions":"Email address does not exist in the system","content":"---\nid: TC-102\npriority: medium\ntags:\n  - authentication\n  - login\n  - negative\n  - security\ncomponent: authentication\nrequirements: [REQ-005]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout\nestimated_duration: 3m\n---\n\n# Login fails with non-existent username\n\n## Preconditions\n\nEmail address does not exist in the system\n\n## Steps\n\n1. Navigate to the login page\n2. Enter non-existent email address\n3. Enter any password\n4. Click the Login button\n\n## Expected Result\n\nLogin fails with generic error message that does not reveal whether the account exists. LOGIN_FAILED event is logged with user identifier as \u0027unknown\u0027.\n\n## Test Data\n\nNon-existent email address\n"},{"id":"TC-103","suite":"authentication","title":"Account lockout after 5 consecutive failed login attempts","file":"TC-103.md","priority":"high","tags":["authentication","security","lockout","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout"],"has_automation":false,"steps":["Navigate to the login page","Enter valid email address","Enter incorrect password and click Login (repeat 5 times)","Observe the response after the 5th failed attempt"],"expected_result":"After the 5th failed attempt, account is locked for 30 minutes. User sees message: \u0027Your account has been temporarily locked. Please try again later or contact support.\u0027 ACCOUNT_LOCKED event is logged to audit trail.","preconditions":"User account exists and is not locked","content":"---\nid: TC-103\npriority: high\ntags:\n  - authentication\n  - security\n  - lockout\n  - negative\ncomponent: authentication\nrequirements: [REQ-005]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout\nestimated_duration: 5m\n---\n\n# Account lockout after 5 consecutive failed login attempts\n\n## Preconditions\n\nUser account exists and is not locked\n\n## Steps\n\n1. Navigate to the login page\n2. Enter valid email address\n3. Enter incorrect password and click Login (repeat 5 times)\n4. Observe the response after the 5th failed attempt\n\n## Expected Result\n\nAfter the 5th failed attempt, account is locked for 30 minutes. User sees message: \u0027Your account has been temporarily locked. Please try again later or contact support.\u0027 ACCOUNT_LOCKED event is logged to audit trail.\n\n## Test Data\n\nValid email, incorrect password\n"},{"id":"TC-104","suite":"authentication","title":"Account remains locked for 30 minutes after lockout","file":"TC-104.md","priority":"medium","tags":["authentication","lockout","timing"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Payments\\RefundTests.cs","has_automation":true,"steps":["Wait for 29 minutes after account lockout","Attempt to login with correct credentials","Observe the response","Wait 1 additional minute (total 30 minutes)","Attempt to login with correct credentials again"],"expected_result":"Login attempt at 29 minutes fails with lockout message. Login attempt at 30 minutes succeeds and user is authenticated. ACCOUNT_UNLOCKED event is logged when lockout expires.","preconditions":"User account is locked due to failed login attempts","content":"---\nid: TC-104\npriority: medium\ntags:\n  - authentication\n  - lockout\n  - timing\ncomponent: authentication\nrequirements: [REQ-005]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout\nestimated_duration: 35m\n---\n\n# Account remains locked for 30 minutes after lockout\n\n## Preconditions\n\nUser account is locked due to failed login attempts\n\n## Steps\n\n1. Wait for 29 minutes after account lockout\n2. Attempt to login with correct credentials\n3. Observe the response\n4. Wait 1 additional minute (total 30 minutes)\n5. Attempt to login with correct credentials again\n\n## Expected Result\n\nLogin attempt at 29 minutes fails with lockout message. Login attempt at 30 minutes succeeds and user is authenticated. ACCOUNT_UNLOCKED event is logged when lockout expires.\n\n## Test Data\n\nValid credentials for locked account\n"},{"id":"TC-105","suite":"authentication","title":"Administrator manually unlocks locked account","file":"TC-105.md","priority":"medium","tags":["authentication","lockout","admin"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Lock user account by failing login 5 times","Login as administrator","Navigate to user management","Select the locked user account","Click \u0027Unlock Account\u0027 button","Attempt to login as the unlocked user with correct credentials"],"expected_result":"Administrator successfully unlocks the account before 30-minute window expires. User can immediately login with correct credentials. ACCOUNT_UNLOCKED event is logged with administrator identifier.","preconditions":"User account is locked, administrator has unlock permissions","content":"---\nid: TC-105\npriority: medium\ntags:\n  - authentication\n  - lockout\n  - admin\ncomponent: authentication\nrequirements: [REQ-005]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout\nestimated_duration: 7m\n---\n\n# Administrator manually unlocks locked account\n\n## Preconditions\n\nUser account is locked, administrator has unlock permissions\n\n## Steps\n\n1. Lock user account by failing login 5 times\n2. Login as administrator\n3. Navigate to user management\n4. Select the locked user account\n5. Click \u0027Unlock Account\u0027 button\n6. Attempt to login as the unlocked user with correct credentials\n\n## Expected Result\n\nAdministrator successfully unlocks the account before 30-minute window expires. User can immediately login with correct credentials. ACCOUNT_UNLOCKED event is logged with administrator identifier.\n\n## Test Data\n\nLocked user account, admin credentials\n"},{"id":"TC-106","suite":"authentication","title":"Password meets minimum complexity requirements","file":"TC-106.md","priority":"high","tags":["authentication","password-policy","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\SessionTests.cs","has_automation":true,"steps":["Navigate to password change form","Enter password with minimum 12 characters","Include at least one uppercase letter (A-Z)","Include at least one lowercase letter (a-z)","Include at least one digit (0-9)","Include at least one special character (!@#$%^\u0026*)","Submit the password"],"expected_result":"Password is accepted and saved. PASSWORD_CHANGED event is logged to audit trail.","preconditions":"User is setting or changing password","content":"---\nid: TC-106\npriority: high\ntags:\n  - authentication\n  - password-policy\n  - positive\ncomponent: authentication\nrequirements: [REQ-002]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password\nestimated_duration: 4m\nautomated_by:\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/SessionTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/SessionTests.cs\n---\n\n# Password meets minimum complexity requirements\n\n## Preconditions\n\nUser is setting or changing password\n\n## Steps\n\n1. Navigate to password change form\n2. Enter password with minimum 12 characters\n3. Include at least one uppercase letter (A-Z)\n4. Include at least one lowercase letter (a-z)\n5. Include at least one digit (0-9)\n6. Include at least one special character (!@#$%^\u0026*)\n7. Submit the password\n\n## Expected Result\n\nPassword is accepted and saved. PASSWORD_CHANGED event is logged to audit trail.\n\n## Test Data\n\nExample: MyP@ssw0rd123\n"},{"id":"TC-107","suite":"authentication","title":"Password rejected when missing uppercase letter","file":"TC-107.md","priority":"medium","tags":["authentication","password-policy","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\MfaTests.cs","has_automation":true,"steps":["Navigate to password change form","Enter password with 12\u002B characters","Include lowercase letters, digits, and special characters","Do NOT include any uppercase letters","Submit the password"],"expected_result":"Password is rejected with error message indicating uppercase letter requirement. Password is not saved.","preconditions":"User is setting or changing password","content":"---\nid: TC-107\npriority: medium\ntags:\n  - authentication\n  - password-policy\n  - negative\ncomponent: authentication\nrequirements: [REQ-002]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password\nestimated_duration: 3m\nautomated_by:\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/MfaTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/MfaTests.cs\n---\n\n# Password rejected when missing uppercase letter\n\n## Preconditions\n\nUser is setting or changing password\n\n## Steps\n\n1. Navigate to password change form\n2. Enter password with 12\u002B characters\n3. Include lowercase letters, digits, and special characters\n4. Do NOT include any uppercase letters\n5. Submit the password\n\n## Expected Result\n\nPassword is rejected with error message indicating uppercase letter requirement. Password is not saved.\n\n## Test Data\n\nExample: myp@ssw0rd123 (no uppercase)\n"},{"id":"TC-108","suite":"authentication","title":"Password rejected when less than 12 characters","file":"TC-108.md","priority":"medium","tags":["authentication","password-policy","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\MfaTests.cs","has_automation":true,"steps":["Navigate to password change form","Enter password with only 11 characters","Include uppercase, lowercase, digit, and special character","Submit the password"],"expected_result":"Password is rejected with error message indicating minimum 12 character requirement. Password is not saved.","preconditions":"User is setting or changing password","content":"---\nid: TC-108\npriority: medium\ntags:\n  - authentication\n  - password-policy\n  - negative\ncomponent: authentication\nrequirements: [REQ-002]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password\nestimated_duration: 3m\nautomated_by:\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/MfaTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/MfaTests.cs\n---\n\n# Password rejected when less than 12 characters\n\n## Preconditions\n\nUser is setting or changing password\n\n## Steps\n\n1. Navigate to password change form\n2. Enter password with only 11 characters\n3. Include uppercase, lowercase, digit, and special character\n4. Submit the password\n\n## Expected Result\n\nPassword is rejected with error message indicating minimum 12 character requirement. Password is not saved.\n\n## Test Data\n\nExample: MyP@ss0rd1 (11 chars)\n"},{"id":"TC-109","suite":"authentication","title":"Password rejected when reusing one of last 5 passwords","file":"TC-109.md","priority":"medium","tags":["authentication","password-policy","negative","history"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password"],"has_automation":false,"steps":["Navigate to password change form","Enter a password that was used within the last 5 password changes","Ensure password meets all other complexity requirements","Submit the password"],"expected_result":"Password is rejected with error message indicating password reuse policy. Password is not saved.","preconditions":"User has password history with at least 1 previous password","content":"---\nid: TC-109\npriority: medium\ntags:\n  - authentication\n  - password-policy\n  - negative\n  - history\ncomponent: authentication\nrequirements: [REQ-002]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password\nestimated_duration: 5m\n---\n\n# Password rejected when reusing one of last 5 passwords\n\n## Preconditions\n\nUser has password history with at least 1 previous password\n\n## Steps\n\n1. Navigate to password change form\n2. Enter a password that was used within the last 5 password changes\n3. Ensure password meets all other complexity requirements\n4. Submit the password\n\n## Expected Result\n\nPassword is rejected with error message indicating password reuse policy. Password is not saved.\n\n## Test Data\n\nPreviously used password from last 5 changes\n"},{"id":"TC-110","suite":"authentication","title":"Temporary password expires after 24 hours","file":"TC-110.md","priority":"medium","tags":["authentication","temporary-password","negative","expiration"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Administrator-Reset"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\MfaTests.cs","has_automation":true,"steps":["Administrator issues temporary password for user","Wait 24 hours and 1 minute","Attempt to login with the temporary password"],"expected_result":"Login fails with message indicating temporary password has expired. User must request a new temporary password or use password reset flow.","preconditions":"Administrator issued temporary password to user","content":"---\nid: TC-110\npriority: medium\ntags:\n  - authentication\n  - temporary-password\n  - negative\n  - expiration\ncomponent: authentication\nrequirements: [REQ-008]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Administrator-Reset\nautomated_by:\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/MfaTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/MfaTests.cs\n---\n\n# Temporary password expires after 24 hours\n\n## Preconditions\n\nAdministrator issued temporary password to user\n\n## Steps\n\n1. Administrator issues temporary password for user\n2. Wait 24 hours and 1 minute\n3. Attempt to login with the temporary password\n\n## Expected Result\n\nLogin fails with message indicating temporary password has expired. User must request a new temporary password or use password reset flow.\n\n## Test Data\n\nTemporary password issued 24\u002B hours ago\n"},{"id":"TC-111","suite":"authentication","title":"Temporary password must be changed on first login","file":"TC-111.md","priority":"high","tags":["authentication","temporary-password","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Administrator-Reset"],"has_automation":false,"steps":["Administrator issues temporary password for user","User receives temporary password via email","User logs in with temporary password","Observe system behavior"],"expected_result":"System forces user to change password before granting access. User cannot proceed to dashboard until new password is set. New password must meet password policy requirements.","preconditions":"Administrator issued temporary password to user","content":"---\nid: TC-111\npriority: high\ntags:\n  - authentication\n  - temporary-password\n  - positive\ncomponent: authentication\nrequirements: [REQ-008]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Administrator-Reset\nestimated_duration: 5m\n---\n\n# Temporary password must be changed on first login\n\n## Preconditions\n\nAdministrator issued temporary password to user\n\n## Steps\n\n1. Administrator issues temporary password for user\n2. User receives temporary password via email\n3. User logs in with temporary password\n4. Observe system behavior\n\n## Expected Result\n\nSystem forces user to change password before granting access. User cannot proceed to dashboard until new password is set. New password must meet password policy requirements.\n\n## Test Data\n\nValid temporary password\n"},{"id":"TC-112","suite":"authentication","title":"MFA enrollment forced for internal user without MFA","file":"TC-112.md","priority":"high","tags":["authentication","mfa","enrollment"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA"],"has_automation":false,"steps":["Login as internal user with valid username and password","User has not enrolled in any MFA method","Complete username/password authentication"],"expected_result":"System forces MFA enrollment before granting access. User is presented with MFA setup options (TOTP, SMS OTP, Email OTP) and cannot proceed to dashboard until enrollment is complete.","preconditions":"Internal user account exists without MFA enrolled, MFA is mandatory for internal users","content":"---\nid: TC-112\npriority: high\ntags:\n  - authentication\n  - mfa\n  - enrollment\ncomponent: authentication\nrequirements: [REQ-003]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA\nestimated_duration: 7m\n---\n\n# MFA enrollment forced for internal user without MFA\n\n## Preconditions\n\nInternal user account exists without MFA enrolled, MFA is mandatory for internal users\n\n## Steps\n\n1. Login as internal user with valid username and password\n2. User has not enrolled in any MFA method\n3. Complete username/password authentication\n\n## Expected Result\n\nSystem forces MFA enrollment before granting access. User is presented with MFA setup options (TOTP, SMS OTP, Email OTP) and cannot proceed to dashboard until enrollment is complete.\n\n## Test Data\n\nInternal user without MFA\n"},{"id":"TC-113","suite":"authentication","title":"TOTP MFA code successfully validates login","file":"TC-113.md","priority":"high","tags":["authentication","mfa","totp","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA"],"has_automation":false,"steps":["Login with valid username and password","System prompts for MFA code","Open authenticator app and retrieve current TOTP code","Enter the 6-digit TOTP code","Submit the code"],"expected_result":"TOTP code is validated successfully. User is authenticated and redirected to dashboard. MFA_SUCCESS event is logged to audit trail.","preconditions":"User has TOTP MFA enrolled (Google Authenticator or Microsoft Authenticator)","content":"---\nid: TC-113\npriority: high\ntags:\n  - authentication\n  - mfa\n  - totp\n  - positive\ncomponent: authentication\nrequirements: [REQ-003]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA\nestimated_duration: 4m\n---\n\n# TOTP MFA code successfully validates login\n\n## Preconditions\n\nUser has TOTP MFA enrolled (Google Authenticator or Microsoft Authenticator)\n\n## Steps\n\n1. Login with valid username and password\n2. System prompts for MFA code\n3. Open authenticator app and retrieve current TOTP code\n4. Enter the 6-digit TOTP code\n5. Submit the code\n\n## Expected Result\n\nTOTP code is validated successfully. User is authenticated and redirected to dashboard. MFA_SUCCESS event is logged to audit trail.\n\n## Test Data\n\nValid TOTP code from authenticator app\n"},{"id":"TC-114","suite":"authentication","title":"SMS OTP code sent and valid for 5 minutes","file":"TC-114.md","priority":"high","tags":["authentication","mfa","sms","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA"],"has_automation":false,"steps":["Login with valid username and password","Select SMS OTP as MFA method","System sends 6-digit code to registered phone","Receive SMS with code","Enter the code within 5 minutes","Submit the code"],"expected_result":"SMS OTP code is sent to registered phone number. Code is valid for 5 minutes. User is authenticated when correct code is entered within validity period. MFA_SUCCESS event is logged.","preconditions":"User has SMS OTP enrolled with registered phone number","content":"---\nid: TC-114\npriority: high\ntags:\n  - authentication\n  - mfa\n  - sms\n  - positive\ncomponent: authentication\nrequirements: [REQ-003]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA\nestimated_duration: 6m\n---\n\n# SMS OTP code sent and valid for 5 minutes\n\n## Preconditions\n\nUser has SMS OTP enrolled with registered phone number\n\n## Steps\n\n1. Login with valid username and password\n2. Select SMS OTP as MFA method\n3. System sends 6-digit code to registered phone\n4. Receive SMS with code\n5. Enter the code within 5 minutes\n6. Submit the code\n\n## Expected Result\n\nSMS OTP code is sent to registered phone number. Code is valid for 5 minutes. User is authenticated when correct code is entered within validity period. MFA_SUCCESS event is logged.\n\n## Test Data\n\nValid SMS OTP code received within 5 minutes\n"},{"id":"TC-115","suite":"authentication","title":"Email OTP code sent and valid for 10 minutes","file":"TC-115.md","priority":"high","tags":["authentication","mfa","email","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA"],"has_automation":false,"steps":["Login with valid username and password","Select Email OTP as MFA method","System sends 6-digit code to registered email","Check email and retrieve code","Enter the code within 10 minutes","Submit the code"],"expected_result":"Email OTP code is sent to registered email address. Code is valid for 10 minutes. User is authenticated when correct code is entered within validity period. MFA_SUCCESS event is logged.","preconditions":"User has Email OTP enrolled with registered email","content":"---\nid: TC-115\npriority: high\ntags:\n  - authentication\n  - mfa\n  - email\n  - positive\ncomponent: authentication\nrequirements: [REQ-003]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA\nestimated_duration: 6m\n---\n\n# Email OTP code sent and valid for 10 minutes\n\n## Preconditions\n\nUser has Email OTP enrolled with registered email\n\n## Steps\n\n1. Login with valid username and password\n2. Select Email OTP as MFA method\n3. System sends 6-digit code to registered email\n4. Check email and retrieve code\n5. Enter the code within 10 minutes\n6. Submit the code\n\n## Expected Result\n\nEmail OTP code is sent to registered email address. Code is valid for 10 minutes. User is authenticated when correct code is entered within validity period. MFA_SUCCESS event is logged.\n\n## Test Data\n\nValid Email OTP code received within 10 minutes\n"},{"id":"TC-116","suite":"authentication","title":"MFA session invalidated after 3 failed code attempts","file":"TC-116.md","priority":"high","tags":["authentication","mfa","negative","security"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA"],"has_automation":false,"steps":["Login with valid username and password","System prompts for MFA code","Enter incorrect MFA code (1st attempt)","Enter incorrect MFA code (2nd attempt)","Enter incorrect MFA code (3rd attempt)","Observe system behavior"],"expected_result":"After 3 failed MFA code attempts, the MFA session is invalidated. User must restart the login process from the beginning (username/password). MFA_FAILED events are logged for each failed attempt.","preconditions":"User has completed username/password authentication and is at MFA prompt","content":"---\nid: TC-116\npriority: high\ntags:\n  - authentication\n  - mfa\n  - negative\n  - security\ncomponent: authentication\nrequirements: [REQ-003]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA\nestimated_duration: 5m\n---\n\n# MFA session invalidated after 3 failed code attempts\n\n## Preconditions\n\nUser has completed username/password authentication and is at MFA prompt\n\n## Steps\n\n1. Login with valid username and password\n2. System prompts for MFA code\n3. Enter incorrect MFA code (1st attempt)\n4. Enter incorrect MFA code (2nd attempt)\n5. Enter incorrect MFA code (3rd attempt)\n6. Observe system behavior\n\n## Expected Result\n\nAfter 3 failed MFA code attempts, the MFA session is invalidated. User must restart the login process from the beginning (username/password). MFA_FAILED events are logged for each failed attempt.\n\n## Test Data\n\nIncorrect MFA codes\n"},{"id":"TC-117","suite":"authentication","title":"SSO authentication via Azure AD SAML 2.0","file":"TC-117.md","priority":"high","tags":["authentication","sso","saml","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Single-Sign-On-SSO"],"has_automation":false,"steps":["Navigate to login page","Enter email address with SSO-enabled domain","Observe automatic redirect to Azure AD IdP","Authenticate with Azure AD credentials","Complete Azure AD authentication flow","Observe redirect back to application"],"expected_result":"Username/password form is hidden. User is automatically redirected to Azure AD IdP. After successful Azure AD authentication, user is redirected back and authenticated in the application. LOGIN_SUCCESS event is logged.","preconditions":"SSO is enabled for user\u0027s domain, Azure AD tenant is configured","content":"---\nid: TC-117\npriority: high\ntags:\n  - authentication\n  - sso\n  - saml\n  - positive\ncomponent: authentication\nrequirements: [REQ-004]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Single-Sign-On-SSO\nestimated_duration: 5m\n---\n\n# SSO authentication via Azure AD SAML 2.0\n\n## Preconditions\n\nSSO is enabled for user\u0027s domain, Azure AD tenant is configured\n\n## Steps\n\n1. Navigate to login page\n2. Enter email address with SSO-enabled domain\n3. Observe automatic redirect to Azure AD IdP\n4. Authenticate with Azure AD credentials\n5. Complete Azure AD authentication flow\n6. Observe redirect back to application\n\n## Expected Result\n\nUsername/password form is hidden. User is automatically redirected to Azure AD IdP. After successful Azure AD authentication, user is redirected back and authenticated in the application. LOGIN_SUCCESS event is logged.\n\n## Test Data\n\nUser with SSO-enabled domain, valid Azure AD credentials\n"},{"id":"TC-118","suite":"authentication","title":"SSO auto-provisions new user from SAML assertion","file":"TC-118.md","priority":"medium","tags":["authentication","sso","provisioning","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Single-Sign-On-SSO"],"has_automation":false,"steps":["Navigate to login page with user that exists in Azure AD but not locally","Complete SSO authentication via Azure AD","Observe system behavior after successful SSO","Verify new user account is created","Check user role and department assignment"],"expected_result":"If SSO authentication succeeds but user does not exist locally, a new account is provisioned automatically with \u0027Employee\u0027 role and department from SAML assertion. SSO_PROVISIONED event is logged. User is authenticated and can access the system.","preconditions":"SSO is enabled, user exists in Azure AD but not in local system","content":"---\nid: TC-118\npriority: medium\ntags:\n  - authentication\n  - sso\n  - provisioning\n  - positive\ncomponent: authentication\nrequirements: [REQ-004]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Single-Sign-On-SSO\nestimated_duration: 7m\n---\n\n# SSO auto-provisions new user from SAML assertion\n\n## Preconditions\n\nSSO is enabled, user exists in Azure AD but not in local system\n\n## Steps\n\n1. Navigate to login page with user that exists in Azure AD but not locally\n2. Complete SSO authentication via Azure AD\n3. Observe system behavior after successful SSO\n4. Verify new user account is created\n5. Check user role and department assignment\n\n## Expected Result\n\nIf SSO authentication succeeds but user does not exist locally, a new account is provisioned automatically with \u0027Employee\u0027 role and department from SAML assertion. SSO_PROVISIONED event is logged. User is authenticated and can access the system.\n\n## Test Data\n\nAzure AD user not in local system, SAML assertion with department attribute\n"},{"id":"TC-119","suite":"authentication","title":"Session timeout after 30 minutes of inactivity for internal users","file":"TC-119.md","priority":"medium","tags":["authentication","session","timeout"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management"],"has_automation":false,"steps":["Login as internal user","Perform an action to establish active session","Do not interact with the system for 30 minutes","After 30 minutes, attempt to perform an action"],"expected_result":"After 30 minutes of inactivity, session expires. User is redirected to login page. SESSION_EXPIRED event is logged to audit trail.","preconditions":"Internal user is logged in","content":"---\nid: TC-119\npriority: medium\ntags:\n  - authentication\n  - session\n  - timeout\ncomponent: authentication\nrequirements: [REQ-006]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management\nestimated_duration: 35m\n---\n\n# Session timeout after 30 minutes of inactivity for internal users\n\n## Preconditions\n\nInternal user is logged in\n\n## Steps\n\n1. Login as internal user\n2. Perform an action to establish active session\n3. Do not interact with the system for 30 minutes\n4. After 30 minutes, attempt to perform an action\n\n## Expected Result\n\nAfter 30 minutes of inactivity, session expires. User is redirected to login page. SESSION_EXPIRED event is logged to audit trail.\n\n## Test Data\n\nInternal user session\n"},{"id":"TC-120","suite":"authentication","title":"Session timeout after 60 minutes of inactivity for citizens","file":"TC-120.md","priority":"medium","tags":["authentication","session","timeout","citizen"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management"],"has_automation":false,"steps":["Login as citizen user","Perform an action to establish active session","Do not interact with the system for 60 minutes","After 60 minutes, attempt to perform an action"],"expected_result":"After 60 minutes of inactivity, session expires. User is redirected to login page. SESSION_EXPIRED event is logged to audit trail.","preconditions":"Citizen user is logged in","content":"---\nid: TC-120\npriority: medium\ntags:\n  - authentication\n  - session\n  - timeout\n  - citizen\ncomponent: authentication\nrequirements: [REQ-006]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management\nestimated_duration: 1h5m\n---\n\n# Session timeout after 60 minutes of inactivity for citizens\n\n## Preconditions\n\nCitizen user is logged in\n\n## Steps\n\n1. Login as citizen user\n2. Perform an action to establish active session\n3. Do not interact with the system for 60 minutes\n4. After 60 minutes, attempt to perform an action\n\n## Expected Result\n\nAfter 60 minutes of inactivity, session expires. User is redirected to login page. SESSION_EXPIRED event is logged to audit trail.\n\n## Test Data\n\nCitizen user session\n"},{"id":"TC-121","suite":"authentication","title":"Fourth concurrent session terminates oldest session","file":"TC-121.md","priority":"medium","tags":["authentication","session","concurrent"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management"],"has_automation":false,"steps":["Login from Browser 1 (Session 1)","Login from Browser 2 (Session 2)","Login from Browser 3 (Session 3)","Verify all 3 sessions are active","Login from Browser 4 (Session 4)","Attempt to perform action in Browser 1 (oldest session)"],"expected_result":"Maximum 3 concurrent sessions are allowed. When 4th session is initiated, the oldest session (Session 1) is terminated automatically. User in Browser 1 is logged out and must re-authenticate.","preconditions":"User account exists","content":"---\nid: TC-121\npriority: medium\ntags:\n  - authentication\n  - session\n  - concurrent\ncomponent: authentication\nrequirements: [REQ-006]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management\nestimated_duration: 8m\n---\n\n# Fourth concurrent session terminates oldest session\n\n## Preconditions\n\nUser account exists\n\n## Steps\n\n1. Login from Browser 1 (Session 1)\n2. Login from Browser 2 (Session 2)\n3. Login from Browser 3 (Session 3)\n4. Verify all 3 sessions are active\n5. Login from Browser 4 (Session 4)\n6. Attempt to perform action in Browser 1 (oldest session)\n\n## Expected Result\n\nMaximum 3 concurrent sessions are allowed. When 4th session is initiated, the oldest session (Session 1) is terminated automatically. User in Browser 1 is logged out and must re-authenticate.\n\n## Test Data\n\nSingle user account, 4 different browsers/devices\n"},{"id":"TC-122","suite":"authentication","title":"Session invalidated when IP address changes mid-session","file":"TC-122.md","priority":"high","tags":["authentication","session","security","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management"],"has_automation":false,"steps":["Login and establish active session from IP address A","Perform an action to verify session is active","Change IP address (e.g., switch networks, use VPN)","Attempt to perform another action from IP address B"],"expected_result":"Session is invalidated when IP address changes mid-session. User is logged out and must re-authenticate. SESSION_EXPIRED event is logged with IP change noted.","preconditions":"User is logged in with active session","content":"---\nid: TC-122\npriority: high\ntags:\n  - authentication\n  - session\n  - security\n  - negative\ncomponent: authentication\nrequirements: [REQ-006]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management\nestimated_duration: 6m\n---\n\n# Session invalidated when IP address changes mid-session\n\n## Preconditions\n\nUser is logged in with active session\n\n## Steps\n\n1. Login and establish active session from IP address A\n2. Perform an action to verify session is active\n3. Change IP address (e.g., switch networks, use VPN)\n4. Attempt to perform another action from IP address B\n\n## Expected Result\n\nSession is invalidated when IP address changes mid-session. User is logged out and must re-authenticate. SESSION_EXPIRED event is logged with IP change noted.\n\n## Test Data\n\nActive session, ability to change IP address\n"},{"id":"TC-123","suite":"authentication","title":"Remember me extends session to 14 days","file":"TC-123.md","priority":"medium","tags":["authentication","session","remember-me","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management"],"has_automation":false,"steps":["Navigate to login page","Enter valid credentials","Check the \u0027Remember me\u0027 checkbox","Click Login","Close browser","Reopen browser after several days (but within 14 days)","Navigate to application"],"expected_result":"\u0027Remember me\u0027 option extends session to 14 days. User remains authenticated across browser sessions within 14-day period. MFA is still required on each new browser even with \u0027Remember me\u0027 enabled.","preconditions":"User account exists","content":"---\nid: TC-123\npriority: medium\ntags:\n  - authentication\n  - session\n  - remember-me\n  - positive\ncomponent: authentication\nrequirements: [REQ-006]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management\nestimated_duration: 10m\n---\n\n# Remember me extends session to 14 days\n\n## Preconditions\n\nUser account exists\n\n## Steps\n\n1. Navigate to login page\n2. Enter valid credentials\n3. Check the \u0027Remember me\u0027 checkbox\n4. Click Login\n5. Close browser\n6. Reopen browser after several days (but within 14 days)\n7. Navigate to application\n\n## Expected Result\n\n\u0027Remember me\u0027 option extends session to 14 days. User remains authenticated across browser sessions within 14-day period. MFA is still required on each new browser even with \u0027Remember me\u0027 enabled.\n\n## Test Data\n\nValid credentials, \u0027Remember me\u0027 enabled\n"},{"id":"TC-124","suite":"authentication","title":"Self-service password reset link sent and valid for 1 hour","file":"TC-124.md","priority":"high","tags":["authentication","password-reset","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset"],"has_automation":false,"steps":["Navigate to login page","Click \u0027Forgot Password\u0027 link","Enter registered email address","Submit the form","Check email for password reset link","Click the reset link within 1 hour","Set new password meeting policy requirements"],"expected_result":"Password reset link is sent to registered email and is valid for 1 hour. User can set new password within validity period. PASSWORD_RESET_REQUESTED event is logged when link is requested. PASSWORD_CHANGED event is logged when password is successfully changed.","preconditions":"User account exists with registered email","content":"---\nid: TC-124\npriority: high\ntags:\n  - authentication\n  - password-reset\n  - positive\ncomponent: authentication\nrequirements: [REQ-007]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset\nestimated_duration: 6m\n---\n\n# Self-service password reset link sent and valid for 1 hour\n\n## Preconditions\n\nUser account exists with registered email\n\n## Steps\n\n1. Navigate to login page\n2. Click \u0027Forgot Password\u0027 link\n3. Enter registered email address\n4. Submit the form\n5. Check email for password reset link\n6. Click the reset link within 1 hour\n7. Set new password meeting policy requirements\n\n## Expected Result\n\nPassword reset link is sent to registered email and is valid for 1 hour. User can set new password within validity period. PASSWORD_RESET_REQUESTED event is logged when link is requested. PASSWORD_CHANGED event is logged when password is successfully changed.\n\n## Test Data\n\nRegistered email address, new password meeting policy\n"},{"id":"TC-125","suite":"authentication","title":"Password reset link can only be used once","file":"TC-125.md","priority":"medium","tags":["authentication","password-reset","security","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset"],"has_automation":false,"steps":["Request password reset and receive email with reset link","Click the reset link","Set new password successfully","Attempt to use the same reset link again"],"expected_result":"Password reset link can be used exactly once. After successful password change, the link is invalidated. Second attempt to use the same link fails with error message indicating link has already been used or is invalid.","preconditions":"User has requested password reset and received reset link","content":"---\nid: TC-125\npriority: medium\ntags:\n  - authentication\n  - password-reset\n  - security\n  - negative\ncomponent: authentication\nrequirements: [REQ-007]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset\nestimated_duration: 5m\n---\n\n# Password reset link can only be used once\n\n## Preconditions\n\nUser has requested password reset and received reset link\n\n## Steps\n\n1. Request password reset and receive email with reset link\n2. Click the reset link\n3. Set new password successfully\n4. Attempt to use the same reset link again\n\n## Expected Result\n\nPassword reset link can be used exactly once. After successful password change, the link is invalidated. Second attempt to use the same link fails with error message indicating link has already been used or is invalid.\n\n## Test Data\n\nPassword reset link\n"},{"id":"TC-126","suite":"authentication","title":"All active sessions terminated after password change","file":"TC-126.md","priority":"high","tags":["authentication","password-reset","session","security"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset"],"has_automation":false,"steps":["Login from Browser 1 and establish active session","Login from Browser 2 and establish active session","Verify both sessions are active","From Browser 1, change password via password reset flow","Attempt to perform action in Browser 2"],"expected_result":"All active sessions for the user are terminated upon password change. User in Browser 2 is logged out and must re-authenticate with new password. SESSION_EXPIRED events are logged for all terminated sessions.","preconditions":"User has multiple active sessions","content":"---\nid: TC-126\npriority: high\ntags:\n  - authentication\n  - password-reset\n  - session\n  - security\ncomponent: authentication\nrequirements: [REQ-007]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset\nestimated_duration: 8m\n---\n\n# All active sessions terminated after password change\n\n## Preconditions\n\nUser has multiple active sessions\n\n## Steps\n\n1. Login from Browser 1 and establish active session\n2. Login from Browser 2 and establish active session\n3. Verify both sessions are active\n4. From Browser 1, change password via password reset flow\n5. Attempt to perform action in Browser 2\n\n## Expected Result\n\nAll active sessions for the user are terminated upon password change. User in Browser 2 is logged out and must re-authenticate with new password. SESSION_EXPIRED events are logged for all terminated sessions.\n\n## Test Data\n\nUser with multiple active sessions\n"},{"id":"TC-127","suite":"authentication","title":"Rate limiting blocks IP after 10 login attempts per minute","file":"TC-127.md","priority":"high","tags":["authentication","rate-limiting","security","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Rate-Limiting"],"has_automation":false,"steps":["From a single IP address, attempt to login 10 times within 1 minute","Attempt an 11th login from the same IP address","Observe the response"],"expected_result":"After 10 login attempts per minute from the same IP, the 11th attempt is blocked with HTTP 429 response. IP is blocked for 1 hour. Error message indicates rate limit exceeded.","preconditions":"No existing rate limit blocks on test IP address","content":"---\nid: TC-127\npriority: high\ntags:\n  - authentication\n  - rate-limiting\n  - security\n  - negative\ncomponent: authentication\nrequirements: [REQ-009]\nsource_refs:\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Rate-Limiting\nestimated_duration: 5m\n---\n\n# Rate limiting blocks IP after 10 login attempts per minute\n\n## Preconditions\n\nNo existing rate limit blocks on test IP address\n\n## Steps\n\n1. From a single IP address, attempt to login 10 times within 1 minute\n2. Attempt an 11th login from the same IP address\n3. Observe the response\n\n## Expected Result\n\nAfter 10 login attempts per minute from the same IP, the 11th attempt is blocked with HTTP 429 response. IP is blocked for 1 hour. Error message indicates rate limit exceeded.\n\n## Test Data\n\nSingle IP address, any credentials\n"},{"id":"TC-100","suite":"citizen-registration","title":"Complete citizen registration with valid Bulgarian EGN and QES verification","file":"TC-100.md","priority":"high","tags":["registration","happy-path","qes","identity-verification"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Registration-Wizard-Steps"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Navigate to the citizen registration portal","Step 1: Enter valid personal information (First Name: \u0027\u0418\u0432\u0430\u043D\u0027, Last Name: \u0027\u0418\u0432\u0430\u043D\u043E\u0432\u0027, DOB: 15/03/1990, EGN: valid 10-digit with correct checksum, Gender: auto-filled from EGN, Nationality: Bulgarian)","Click \u0027Next\u0027 and verify no validation errors appear","Step 2: Enter email address and mobile phone (\u002B359 888 123 456)","Enter the 6-digit verification code received via email","Enter the 6-digit verification code received via SMS","Click \u0027Next\u0027 after both verifications are complete","Step 3: Select structured address (Region: \u0421\u043E\u0444\u0438\u044F-\u0433\u0440\u0430\u0434, Municipality: \u0421\u0442\u043E\u043B\u0438\u0447\u043D\u0430, City: \u0421\u043E\u0444\u0438\u044F, Postal Code: 1000, Street: \u0027\u0443\u043B. \u0412\u0438\u0442\u043E\u0448\u0430\u0027, Number: \u00271\u0027)","Click \u0027Next\u0027","Step 4: Select \u0027Qualified Electronic Signature (QES/\u041A\u0415\u041F)\u0027 as identity verification method","Sign the verification challenge using Bulgarian eID","Wait for real-time verification to complete successfully","Click \u0027Next\u0027","Step 5: Enter password meeting policy requirements, check \u0027Terms and Conditions\u0027 checkbox","Click \u0027Next\u0027","Step 6: Review all information on confirmation page","Click \u0027Confirm\u0027 to complete registration","Verify welcome email is received","Verify redirect to citizen dashboard"],"expected_result":"Account is created successfully, welcome email is sent without password, citizen is redirected to dashboard with full access to submit applications","preconditions":"User has a valid Bulgarian eID or qualified certificate for QES signing","content":"---\nid: TC-100\npriority: high\ntags:\n  - registration\n  - happy-path\n  - qes\n  - identity-verification\ncomponent: citizen-registration\nrequirements: [REQ-011]\nsource_refs:\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Registration-Wizard-Steps\nestimated_duration: 8m\n---\n\n# Complete citizen registration with valid Bulgarian EGN and QES verification\n\n## Preconditions\n\nUser has a valid Bulgarian eID or qualified certificate for QES signing\n\n## Steps\n\n1. Navigate to the citizen registration portal\n2. Step 1: Enter valid personal information (First Name: \u0027\u0418\u0432\u0430\u043D\u0027, Last Name: \u0027\u0418\u0432\u0430\u043D\u043E\u0432\u0027, DOB: 15/03/1990, EGN: valid 10-digit with correct checksum, Gender: auto-filled from EGN, Nationality: Bulgarian)\n3. Click \u0027Next\u0027 and verify no validation errors appear\n4. Step 2: Enter email address and mobile phone (\u002B359 888 123 456)\n5. Enter the 6-digit verification code received via email\n6. Enter the 6-digit verification code received via SMS\n7. Click \u0027Next\u0027 after both verifications are complete\n8. Step 3: Select structured address (Region: \u0421\u043E\u0444\u0438\u044F-\u0433\u0440\u0430\u0434, Municipality: \u0421\u0442\u043E\u043B\u0438\u0447\u043D\u0430, City: \u0421\u043E\u0444\u0438\u044F, Postal Code: 1000, Street: \u0027\u0443\u043B. \u0412\u0438\u0442\u043E\u0448\u0430\u0027, Number: \u00271\u0027)\n9. Click \u0027Next\u0027\n10. Step 4: Select \u0027Qualified Electronic Signature (QES/\u041A\u0415\u041F)\u0027 as identity verification method\n11. Sign the verification challenge using Bulgarian eID\n12. Wait for real-time verification to complete successfully\n13. Click \u0027Next\u0027\n14. Step 5: Enter password meeting policy requirements, check \u0027Terms and Conditions\u0027 checkbox\n15. Click \u0027Next\u0027\n16. Step 6: Review all information on confirmation page\n17. Click \u0027Confirm\u0027 to complete registration\n18. Verify welcome email is received\n19. Verify redirect to citizen dashboard\n\n## Expected Result\n\nAccount is created successfully, welcome email is sent without password, citizen is redirected to dashboard with full access to submit applications\n\n## Test Data\n\nEGN: valid 10-digit with checksum, Email: test@example.com, Phone: \u002B359888123456\n"},{"id":"TC-101","suite":"citizen-registration","title":"Register citizen with document upload identity verification","file":"TC-101.md","priority":"high","tags":["registration","document-upload","ocr","identity-verification"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-4-Identity-Verification"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Complete Steps 1-3 of registration wizard with valid Bulgarian citizen data","Step 4: Select \u0027Document Upload\u0027 as identity verification method","Upload front side of Bulgarian ID card (JPEG, under 10 MB, meets resolution requirements)","Upload back side of Bulgarian ID card","Wait for OCR processing to extract document number, expiry date, and name","Review OCR results displayed on screen","Confirm OCR results are correct","Verify document is not expired (expiry date is in the future)","Click \u0027Next\u0027","Complete Step 5 (Account Setup) with password and accept Terms and Conditions","Complete Step 6 (Confirmation) and submit registration"],"expected_result":"OCR successfully extracts document details, document is validated as not expired, account is created, welcome email is sent, citizen is redirected to dashboard","preconditions":"User has valid Bulgarian ID card (\u043B\u0438\u0447\u043D\u0430 \u043A\u0430\u0440\u0442\u0430) scans in JPEG/PNG format, minimum 300 DPI or 1000x600 pixels","content":"---\nid: TC-101\npriority: high\ntags:\n  - registration\n  - document-upload\n  - ocr\n  - identity-verification\ncomponent: citizen-registration\nrequirements: [REQ-014]\nsource_refs:\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-4-Identity-Verification\nestimated_duration: 7m\n---\n\n# Register citizen with document upload identity verification\n\n## Preconditions\n\nUser has valid Bulgarian ID card (\u043B\u0438\u0447\u043D\u0430 \u043A\u0430\u0440\u0442\u0430) scans in JPEG/PNG format, minimum 300 DPI or 1000x600 pixels\n\n## Steps\n\n1. Complete Steps 1-3 of registration wizard with valid Bulgarian citizen data\n2. Step 4: Select \u0027Document Upload\u0027 as identity verification method\n3. Upload front side of Bulgarian ID card (JPEG, under 10 MB, meets resolution requirements)\n4. Upload back side of Bulgarian ID card\n5. Wait for OCR processing to extract document number, expiry date, and name\n6. Review OCR results displayed on screen\n7. Confirm OCR results are correct\n8. Verify document is not expired (expiry date is in the future)\n9. Click \u0027Next\u0027\n10. Complete Step 5 (Account Setup) with password and accept Terms and Conditions\n11. Complete Step 6 (Confirmation) and submit registration\n\n## Expected Result\n\nOCR successfully extracts document details, document is validated as not expired, account is created, welcome email is sent, citizen is redirected to dashboard\n\n## Test Data\n\nID card images: front.jpg (2MB, 1200x800px), back.jpg (2MB, 1200x800px), Document expiry: future date\n"},{"id":"TC-102","suite":"citizen-registration","title":"Attempt registration with invalid EGN checksum","file":"TC-102.md","priority":"medium","tags":["registration","validation","negative","egn"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-1-Personal-Information"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Navigate to the citizen registration portal","Step 1: Enter personal information with invalid EGN (10 digits but incorrect checksum, e.g., \u00271234567890\u0027)","Tab out of the EGN field to trigger on-blur validation","Observe validation error message","Click \u0027Next\u0027 button","Verify validation error is displayed and highlighted in red"],"expected_result":"EGN field is highlighted in red with error message \u0027Invalid EGN checksum\u0027 or similar. User cannot proceed to Step 2 until a valid EGN is entered. Next button shows all validation errors on click.","preconditions":"None","content":"---\nid: TC-102\npriority: medium\ntags:\n  - registration\n  - validation\n  - negative\n  - egn\ncomponent: citizen-registration\nrequirements: [REQ-011]\nsource_refs:\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-1-Personal-Information\nestimated_duration: 3m\n---\n\n# Attempt registration with invalid EGN checksum\n\n## Preconditions\n\nNone\n\n## Steps\n\n1. Navigate to the citizen registration portal\n2. Step 1: Enter personal information with invalid EGN (10 digits but incorrect checksum, e.g., \u00271234567890\u0027)\n3. Tab out of the EGN field to trigger on-blur validation\n4. Observe validation error message\n5. Click \u0027Next\u0027 button\n6. Verify validation error is displayed and highlighted in red\n\n## Expected Result\n\nEGN field is highlighted in red with error message \u0027Invalid EGN checksum\u0027 or similar. User cannot proceed to Step 2 until a valid EGN is entered. Next button shows all validation errors on click.\n\n## Test Data\n\nInvalid EGN: 1234567890 (fails Bulgarian EGN checksum algorithm)\n"},{"id":"TC-103","suite":"citizen-registration","title":"Register with email verification code expiration and retry","file":"TC-103.md","priority":"medium","tags":["registration","verification","negative","timeout"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-2-Contact-Information"],"has_automation":false,"steps":["Complete Step 1 of registration wizard with valid data","Step 2: Enter valid email address","Receive 6-digit verification code via email","Wait for 16 minutes (code expires after 15 minutes)","Attempt to enter the expired verification code","Observe error message indicating code has expired","Click \u0027Request new code\u0027 button","Receive new 6-digit verification code via email","Enter the new code within 15 minutes","Verify email is marked as verified","Complete phone verification","Proceed to Step 3"],"expected_result":"Expired code is rejected with clear error message. User can request a new code (up to 3 times per hour). New code is sent and accepted when entered within 15-minute window. Email verification status is preserved.","preconditions":"None","content":"---\nid: TC-103\npriority: medium\ntags:\n  - registration\n  - verification\n  - negative\n  - timeout\ncomponent: citizen-registration\nrequirements: [REQ-013]\nsource_refs:\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-2-Contact-Information\nestimated_duration: 20m\n---\n\n# Register with email verification code expiration and retry\n\n## Preconditions\n\nNone\n\n## Steps\n\n1. Complete Step 1 of registration wizard with valid data\n2. Step 2: Enter valid email address\n3. Receive 6-digit verification code via email\n4. Wait for 16 minutes (code expires after 15 minutes)\n5. Attempt to enter the expired verification code\n6. Observe error message indicating code has expired\n7. Click \u0027Request new code\u0027 button\n8. Receive new 6-digit verification code via email\n9. Enter the new code within 15 minutes\n10. Verify email is marked as verified\n11. Complete phone verification\n12. Proceed to Step 3\n\n## Expected Result\n\nExpired code is rejected with clear error message. User can request a new code (up to 3 times per hour). New code is sent and accepted when entered within 15-minute window. Email verification status is preserved.\n\n## Test Data\n\nEmail: test@example.com, First code expires after 15 minutes, Second code valid\n"},{"id":"TC-104","suite":"citizen-registration","title":"Attempt registration with duplicate EGN for active account","file":"TC-104.md","priority":"high","tags":["registration","duplicate-detection","negative","egn"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Duplicate-Detection"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Payments\\RefundTests.cs","has_automation":true,"steps":["Navigate to the citizen registration portal","Complete Steps 1-5 of registration wizard using the same EGN as existing active account (\u00278001011234\u0027)","Step 6: Review information and click \u0027Confirm\u0027","Observe duplicate detection check before account creation","Verify error message is displayed"],"expected_result":"System detects duplicate EGN and displays message: \u0027An account with this identification number already exists. Please use the password reset function if you cannot access your account.\u0027 Account creation is blocked.","preconditions":"An active citizen account already exists with EGN \u00278001011234\u0027 (example valid EGN)","content":"---\nid: TC-104\npriority: high\ntags:\n  - registration\n  - duplicate-detection\n  - negative\n  - egn\ncomponent: citizen-registration\nrequirements: [REQ-015]\nsource_refs:\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Duplicate-Detection\nestimated_duration: 6m\n---\n\n# Attempt registration with duplicate EGN for active account\n\n## Preconditions\n\nAn active citizen account already exists with EGN \u00278001011234\u0027 (example valid EGN)\n\n## Steps\n\n1. Navigate to the citizen registration portal\n2. Complete Steps 1-5 of registration wizard using the same EGN as existing active account (\u00278001011234\u0027)\n3. Step 6: Review information and click \u0027Confirm\u0027\n4. Observe duplicate detection check before account creation\n5. Verify error message is displayed\n\n## Expected Result\n\nSystem detects duplicate EGN and displays message: \u0027An account with this identification number already exists. Please use the password reset function if you cannot access your account.\u0027 Account creation is blocked.\n\n## Test Data\n\nDuplicate EGN: 8001011234 (matches existing active account)\n"},{"id":"TC-105","suite":"citizen-registration","title":"Register citizen with in-person verification and resume wizard after 12 hours","file":"TC-105.md","priority":"medium","tags":["registration","wizard-persistence","in-person-verification"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Wizard-Persistence","docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-4-Identity-Verification"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Navigate to the citizen registration portal","Complete Step 1 (Personal Information) with valid data","Complete Step 2 (Contact Information) with email and phone verification","Note that verified email/phone tokens are preserved","Close the browser without completing registration","Wait 12 hours","Return to the registration portal in a new browser session","Verify wizard resumes from Step 3 (last completed step was Step 2)","Verify email and phone verification statuses are still marked as verified (no re-verification required)","Complete Step 3 (Address)","Step 4: Select \u0027In-person Verification\u0027 as identity verification method","Complete Step 5 (Account Setup) and Step 6 (Confirmation)","Submit registration"],"expected_result":"Wizard progress is restored from local storage after 12 hours (within 24-hour window). Verified email/phone tokens are preserved. Account is created in \u0027Pending Verification\u0027 status with limited access. Reminder emails are scheduled for 7, 14, and 21 days.","preconditions":"None","content":"---\nid: TC-105\npriority: medium\ntags:\n  - registration\n  - wizard-persistence\n  - in-person-verification\ncomponent: citizen-registration\nrequirements: [REQ-016]\nsource_refs:\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Wizard-Persistence\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-regis
