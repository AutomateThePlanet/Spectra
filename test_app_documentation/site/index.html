haracter limits (\u003E160 Latin or \u003E70 Cyrillic)","Trigger a notification event that uses this template (e.g., payment received with long service name)","Check the SMS received on the citizen\u0027s registered phone number","Verify the SMS content is truncated","Verify the truncated message ends with \u0027...\u0027 and includes a link to the full notification in the portal"],"expected_result":"SMS message is truncated to 160 characters (Latin) or 70 characters (Cyrillic). The truncated message ends with \u0027...\u0027 followed by a link to view the full notification in the portal.","test_data":"Notification template with content exceeding character limits"},{"test_id":"TC-102","title":"Verify notification preferences take effect immediately after change","status":"Passed","attempt":1,"duration_ms":15173,"preconditions":"Citizen is logged in with all notification channels enabled by default.","steps":["Navigate to notification preferences page","Disable email notifications for a specific category (e.g., \u0027Application status change\u0027)","Save the preference changes","Trigger an application status change event immediately","Check email inbox and in-app notifications","Verify email is NOT received but in-app notification is still delivered"],"expected_result":"Preference changes take effect immediately. No email notification is sent for the disabled category. In-app notification is still delivered as it cannot be disabled. Notifications already queued before the preference change are still sent.","test_data":"Valid citizen account with active application"},{"test_id":"TC-103","title":"Verify notification retry logic with exponential backoff for failed email","status":"Failed","attempt":1,"duration_ms":35349,"notes":"Something else is also happening.","preconditions":"Email service is configured to simulate failures. A notification event is ready to be triggered.","steps":["Configure email service to fail on first 3 attempts","Trigger a notification event that sends an email (e.g., application submitted)","Monitor retry attempts and delays","Verify 1st retry occurs after 1 minute","Verify 2nd retry occurs after 5 minutes from 1st retry","Verify 3rd retry occurs after 30 minutes from 2nd retry","Allow email service to succeed on 4th attempt","Verify email is successfully delivered"],"expected_result":"Failed email notifications are retried with exponential backoff: 1st retry after 1 minute, 2nd after 5 minutes, 3rd after 30 minutes, 4th after 2 hours, 5th after 12 hours. Email is marked as DELIVERED after successful retry. Retry delays match documented schedule.","test_data":"Email service with simulated failures"},{"test_id":"TC-104","title":"Verify rate limiting blocks non-critical notifications when limit exceeded","status":"Passed","attempt":1,"duration_ms":12980,"preconditions":"Citizen account is registered. Multiple notification events can be triggered rapidly.","steps":["Trigger 10 email notifications within one hour for the same citizen (e.g., multiple application status changes)","Verify all 10 emails are delivered","Trigger an 11th non-critical email notification within the same hour","Check email inbox","Verify the 11th email is NOT immediately delivered","Wait for the next available window (after 1 hour from first email)","Verify the queued email is now delivered"],"expected_result":"Rate limiting enforces maximum 10 emails per hour per citizen. The 11th non-critical email is queued and delivered in the next available window. Critical notifications (password reset, account locked) would bypass rate limits.","test_data":"Citizen account with multiple notification triggers"},{"test_id":"TC-105","title":"Verify critical notifications bypass Do Not Disturb mode","status":"Failed","attempt":1,"duration_ms":28791,"notes":"Something bad happened during execution.","preconditions":"Citizen has enabled Do Not Disturb mode with scheduled hours (e.g., 22:00-08:00). Current time is within DND window.","steps":["Log in as citizen and enable Do Not Disturb mode","Set DND schedule to suppress notifications during current time window","Trigger a non-critical notification (e.g., application status change)","Verify push and SMS notifications are suppressed","Trigger a critical notification (e.g., password reset or account locked)","Check all notification channels (email, SMS, push, in-app)","Verify critical notification is delivered on all applicable channels despite DND mode"],"expected_result":"Non-critical notifications are suppressed during DND mode (no push/SMS). Critical notifications (password reset, account locked) bypass DND mode and are delivered on all applicable channels. Email and in-app notifications are delivered but without sound/vibration on mobile during DND.","test_data":"Citizen account with DND enabled and scheduled"}],"report_path":".execution/reports/83c18753-5779-489d-8eab-2b13c3f23cc1.html"},{"run_id":"9b1ab65a-1eba-4b37-a0c4-34daa762647e","suite":"refunds","status":"completed","started_at":"2026-03-21T09:30:32.2756507Z","completed_at":"2026-03-21T09:32:57.9244678Z","started_by":"Anton Angelov","duration_seconds":145,"total":6,"passed":3,"failed":2,"skipped":0,"blocked":1,"results":[{"test_id":"TC-100","title":"Refund card payment after application rejection","status":"Passed","attempt":1,"duration_ms":14321,"preconditions":"Citizen has submitted an application with card payment (Visa/Mastercard) that has been rejected by administration","steps":["Log in as administrator with payments.refund permission","Navigate to the rejected application","Click \u0027Process Refund\u0027 button","Verify refund method is set to \u0027Original Card\u0027 (last 4 digits displayed)","Confirm refund amount matches original payment","Submit refund request","Verify refund status changes to \u0027Processing\u0027","Verify citizen receives email notification about refund"],"expected_result":"Refund is processed back to the original card. System displays message \u0027Refund will be processed within 5-10 business days\u0027. Payment status changes to REFUNDED. Refund transaction is logged in audit trail.","test_data":"Application with card payment: 50.00 BGN, Card ending in 1234"},{"test_id":"TC-101","title":"Refund bank transfer payment for cancelled service within 24 hours","status":"Failed","attempt":1,"duration_ms":24743,"notes":"Something bad happened during the test execution.","preconditions":"Citizen has paid via bank transfer and wants to cancel service within 24 hours of payment","steps":["Log in as citizen who made bank transfer payment","Navigate to \u0027My Applications\u0027 dashboard","Select the paid application (within 24 hours of payment)","Click \u0027Cancel Application\u0027 button","System prompts for IBAN for refund","Enter valid IBAN (BG80BNBG96611020345678)","Confirm cancellation and refund request","Verify application status changes to \u0027Cancelled\u0027","Verify refund request is created with status \u0027Pending\u0027"],"expected_result":"Refund is processed to the provided IBAN. System displays message \u0027Refund will be processed within 3-5 business days\u0027. Citizen receives confirmation email with refund details. Payment status changes to REFUNDED.","test_data":"Bank transfer payment: 5.00 BGN, Payment reference: PR-20260320-123456"},{"test_id":"TC-102","title":"Partial refund for expedited fee only","status":"Passed","attempt":1,"duration_ms":17538,"preconditions":"Application was paid with expedited fee but will be processed as standard service","steps":["Log in as administrator with payments.refund permission","Navigate to application with expedited fee payment (e.g., Certificate of Birth: 5.00 BGN base \u002B 15.00 BGN expedited = 20.00 BGN total)","Select \u0027Process Partial Refund\u0027","Enter refund amount: 15.00 BGN","Enter reason: \u0027Expedited processing not available, refunding expedited fee\u0027","Verify system shows breakdown: Original: 20.00 BGN, Refund: 15.00 BGN, Retained: 5.00 BGN",
