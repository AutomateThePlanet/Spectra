 lockout after 5 consecutive failed login attempts","file":"authentication\\TC-103.md","priority":"high","tags":["authentication","security","lockout","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout"],"has_automation":false,"steps":["Navigate to the login page","Enter valid email address","Enter incorrect password and click Login (repeat 5 times)","Observe the response after the 5th failed attempt"],"expected_result":"After the 5th failed attempt, account is locked for 30 minutes. User sees message: \u0027Your account has been temporarily locked. Please try again later or contact support.\u0027 ACCOUNT_LOCKED event is logged to audit trail.","preconditions":"User account exists and is not locked","content":"---\r\nid: TC-103\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - security\r\n  - lockout\r\n  - negative\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout\r\nestimated_duration: 5m\r\n---\r\n\r\n# Account lockout after 5 consecutive failed login attempts\r\n\r\n## Preconditions\r\n\r\nUser account exists and is not locked\r\n\r\n## Steps\r\n\r\n1. Navigate to the login page\r\n2. Enter valid email address\r\n3. Enter incorrect password and click Login (repeat 5 times)\r\n4. Observe the response after the 5th failed attempt\r\n\r\n## Expected Result\r\n\r\nAfter the 5th failed attempt, account is locked for 30 minutes. User sees message: \u0027Your account has been temporarily locked. Please try again later or contact support.\u0027 ACCOUNT_LOCKED event is logged to audit trail.\r\n\r\n## Test Data\r\n\r\nValid email, incorrect password\r\n"},{"id":"TC-104","suite":"authentication","title":"Account remains locked for 30 minutes after lockout","file":"authentication\\TC-104.md","priority":"medium","tags":["authentication","lockout","timing"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout"],"has_automation":false,"steps":["Wait for 29 minutes after account lockout","Attempt to login with correct credentials","Observe the response","Wait 1 additional minute (total 30 minutes)","Attempt to login with correct credentials again"],"expected_result":"Login attempt at 29 minutes fails with lockout message. Login attempt at 30 minutes succeeds and user is authenticated. ACCOUNT_UNLOCKED event is logged when lockout expires.","preconditions":"User account is locked due to failed login attempts","content":"---\r\nid: TC-104\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - lockout\r\n  - timing\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout\r\nestimated_duration: 35m\r\n---\r\n\r\n# Account remains locked for 30 minutes after lockout\r\n\r\n## Preconditions\r\n\r\nUser account is locked due to failed login attempts\r\n\r\n## Steps\r\n\r\n1. Wait for 29 minutes after account lockout\r\n2. Attempt to login with correct credentials\r\n3. Observe the response\r\n4. Wait 1 additional minute (total 30 minutes)\r\n5. Attempt to login with correct credentials again\r\n\r\n## Expected Result\r\n\r\nLogin attempt at 29 minutes fails with lockout message. Login attempt at 30 minutes succeeds and user is authenticated. ACCOUNT_UNLOCKED event is logged when lockout expires.\r\n\r\n## Test Data\r\n\r\nValid credentials for locked account\r\n"},{"id":"TC-105","suite":"authentication","title":"Administrator manually unlocks locked account","file":"authentication\\TC-105.md","priority":"medium","tags":["authentication","lockout","admin"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout"],"has_automation":false,"steps":["Lock user account by failing login 5 times","Login as administrator","Navigate to user management","Select the locked user account","Click \u0027Unlock Account\u0027 button","Attempt to login as the unlocked user with correct credentials"],"expected_result":"Administrator successfully unlocks the account before 30-minute window expires. User can immediately login with correct credentials. ACCOUNT_UNLOCKED event is logged with administrator identifier.","preconditions":"User account is locked, administrator has unlock permissions","content":"---\r\nid: TC-105\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - lockout\r\n  - admin\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout\r\nestimated_duration: 7m\r\n---\r\n\r\n# Administrator manually unlocks locked account\r\n\r\n## Preconditions\r\n\r\nUser account is locked, administrator has unlock permissions\r\n\r\n## Steps\r\n\r\n1. Lock user account by failing login 5 times\r\n2. Login as administrator\r\n3. Navigate to user management\r\n4. Select the locked user account\r\n5. Click \u0027Unlock Account\u0027 button\r\n6. Attempt to login as the unlocked user with correct credentials\r\n\r\n## Expected Result\r\n\r\nAdministrator successfully unlocks the account before 30-minute window expires. User can immediately login with correct credentials. ACCOUNT_UNLOCKED event is logged with administrator identifier.\r\n\r\n## Test Data\r\n\r\nLocked user account, admin credentials\r\n"},{"id":"TC-106","suite":"authentication","title":"Password meets minimum complexity requirements","file":"authentication\\TC-106.md","priority":"high","tags":["authentication","password-policy","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password"],"has_automation":false,"steps":["Navigate to password change form","Enter password with minimum 12 characters","Include at least one uppercase letter (A-Z)","Include at least one lowercase letter (a-z)","Include at least one digit (0-9)","Include at least one special character (!@#$%^\u0026*)","Submit the password"],"expected_result":"Password is accepted and saved. PASSWORD_CHANGED event is logged to audit trail.","preconditions":"User is setting or changing password","content":"---\r\nid: TC-106\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - password-policy\r\n  - positive\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password\r\nestimated_duration: 4m\r\n---\r\n\r\n# Password meets minimum complexity requirements\r\n\r\n## Preconditions\r\n\r\nUser is setting or changing password\r\n\r\n## Steps\r\n\r\n1. Navigate to password change form\r\n2. Enter password with minimum 12 characters\r\n3. Include at least one uppercase letter (A-Z)\r\n4. Include at least one lowercase letter (a-z)\r\n5. Include at least one digit (0-9)\r\n6. Include at least one special character (!@#$%^\u0026*)\r\n7. Submit the password\r\n\r\n## Expected Result\r\n\r\nPassword is accepted and saved. PASSWORD_CHANGED event is logged to audit trail.\r\n\r\n## Test Data\r\n\r\nExample: MyP@ssw0rd123\r\n"},{"id":"TC-107","suite":"authentication","title":"Password rejected when missing uppercase letter","file":"authentication\\TC-107.md","priority":"medium","tags":["authentication","password-policy","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password"],"has_automation":false,"steps":["Navigate to password change form","Enter password with 12\u002B characters","Include lowercase letters, digits, and special characters","Do NOT include any uppercase letters","Submit the password"],"expected_result":"Password is rejected with error message indicating uppercase letter requirement. Password is not saved.","preconditions":"User is setting or changing password","content":"---\r\nid: TC-107\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - password-policy\r\n  - negative\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password\r\nestimated_duration: 3m\r\n---\r\n\r\n# Password rejected when missing uppercase letter\r\n\r\n## Preconditions\r\n\r\nUser is setting or changing password\r\n\r\n## Steps\r\n\r\n1. Navigate to password change form\r\n2. Enter password with 12\u002B characters\r\n3. Include lowercase letters, digits, and special characters\r\n4. Do NOT include any uppercase letters\r\n5. Submit the password\r\n\r\n## Expected Result\r\n\r\nPassword is rejected with error message indicating uppercase letter requirement. Password is not saved.\r\n\r\n## Test Data\r\n\r\nExample: myp@ssw0rd123 (no uppercase)\r\n"},{"id":"TC-108","suite":"authentication","title":"Password rejected when less than 12 characters","file":"authentication\\TC-108.md","priority":"medium","tags":["authentication","password-policy","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password"],"has_automation":false,"steps":["Navigate to password change form","Enter password with only 11 characters","Include uppercase, lowercase, digit, and special character","Submit the password"],"expected_result":"Password is rejected with error message indicating minimum 12 character requirement. Password is not saved.","preconditions":"User is setting or changing password","content":"---\r\nid: TC-108\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - password-policy\r\n  - negative\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password\r\nestimated_duration: 3m\r\n---\r\n\r\n# Password rejected when less than 12 characters\r\n\r\n## Preconditions\r\n\r\nUser is setting or changing password\r\n\r\n## Steps\r\n\r\n1. Navigate to password change form\r\n2. Enter password with only 11 characters\r\n3. Include uppercase, lowercase, digit, and special character\r\n4. Submit the password\r\n\r\n## Expected Result\r\n\r\nPassword is rejected with error message indicating minimum 12 character requirement. Password is not saved.\r\n\r\n## Test Data\r\n\r\nExample: MyP@ss0rd1 (11 chars)\r\n"},{"id":"TC-109","suite":"authentication","title":"Password rejected when reusing one of last 5 passwords","file":"authentication\\TC-109.md","priority":"medium","tags":["authentication","password-policy","negative","history"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password"],"has_automation":false,"steps":["Navigate to password change form","Enter a password that was used within the last 5 password changes","Ensure password meets all other complexity requirements","Submit the password"],"expected_result":"Password is rejected with error message indicating password reuse policy. Password is not saved.","preconditions":"User has password history with at least 1 previous password","content":"---\r\nid: TC-109\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - password-policy\r\n  - negative\r\n  - history\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Username-and-Password\r\nestimated_duration: 5m\r\n---\r\n\r\n# Password rejected when reusing one of last 5 passwords\r\n\r\n## Preconditions\r\n\r\nUser has password history with at least 1 previous password\r\n\r\n## Steps\r\n\r\n1. Navigate to password change form\r\n2. Enter a password that was used within the last 5 password changes\r\n3. Ensure password meets all other complexity requirements\r\n4. Submit the password\r\n\r\n## Expected Result\r\n\r\nPassword is rejected with error message indicating password reuse policy. Password is not saved.\r\n\r\n## Test Data\r\n\r\nPreviously used password from last 5 changes\r\n"},{"id":"TC-110","suite":"authentication","title":"Temporary password expires after 24 hours","file":"authentication\\TC-110.md","priority":"medium","tags":["authentication","temporary-password","negative","expiration"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Administrator-Reset"],"has_automation":false,"steps":["Administrator issues temporary password for user","Wait 24 hours and 1 minute","Attempt to login with the temporary password"],"expected_result":"Login fails with message indicating temporary password has expired. User must request a new temporary password or use password reset flow.","preconditions":"Administrator issued temporary password to user","content":"---\r\nid: TC-110\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - temporary-password\r\n  - negative\r\n  - expiration\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Administrator-Reset\r\n---\r\n\r\n# Temporary password expires after 24 hours\r\n\r\n## Preconditions\r\n\r\nAdministrator issued temporary password to user\r\n\r\n## Steps\r\n\r\n1. Administrator issues temporary password for user\r\n2. Wait 24 hours and 1 minute\r\n3. Attempt to login with the temporary password\r\n\r\n## Expected Result\r\n\r\nLogin fails with message indicating temporary password has expired. User must request a new temporary password or use password reset flow.\r\n\r\n## Test Data\r\n\r\nTemporary password issued 24\u002B hours ago\r\n"},{"id":"TC-111","suite":"authentication","title":"Temporary password must be changed on first login","file":"authentication\\TC-111.md","priority":"high","tags":["authentication","temporary-password","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Administrator-Reset"],"has_automation":false,"steps":["Administrator issues temporary password for user","User receives temporary password via email","User logs in with temporary password","Observe system behavior"],"expected_result":"System forces user to change password before granting access. User cannot proceed to dashboard until new password is set. New password must meet password policy requirements.","preconditions":"Administrator issued temporary password to user","content":"---\r\nid: TC-111\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - temporary-password\r\n  - positive\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Administrator-Reset\r\nestimated_duration: 5m\r\n---\r\n\r\n# Temporary password must be changed on first login\r\n\r\n## Preconditions\r\n\r\nAdministrator issued temporary password to user\r\n\r\n## Steps\r\n\r\n1. Administrator issues temporary password for user\r\n2. User receives temporary password via email\r\n3. User logs in with temporary password\r\n4. Observe system behavior\r\n\r\n## Expected Result\r\n\r\nSystem forces user to change password before granting access. User cannot proceed to dashboard until new password is set. New password must meet password policy requirements.\r\n\r\n## Test Data\r\n\r\nValid temporary password\r\n"},{"id":"TC-112","suite":"authentication","title":"MFA enrollment forced for internal user without MFA","file":"authentication\\TC-112.md","priority":"high","tags":["authentication","mfa","enrollment"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA"],"has_automation":false,"steps":["Login as internal user with valid username and password","User has not enrolled in any MFA method","Complete username/password authentication"],"expected_result":"System forces MFA enrollment before granting access. User is presented with MFA setup options (TOTP, SMS OTP, Email OTP) and cannot proceed to dashboard until enrollment is complete.","preconditions":"Internal user account exists without MFA enrolled, MFA is mandatory for internal users","content":"---\r\nid: TC-112\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - mfa\r\n  - enrollment\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA\r\nestimated_duration: 7m\r\n---\r\n\r\n# MFA enrollment forced for internal user without MFA\r\n\r\n## Preconditions\r\n\r\nInternal user account exists without MFA enrolled, MFA is mandatory for internal users\r\n\r\n## Steps\r\n\r\n1. Login as internal user with valid username and password\r\n2. User has not enrolled in any MFA method\r\n3. Complete username/password authentication\r\n\r\n## Expected Result\r\n\r\nSystem forces MFA enrollment before granting access. User is presented with MFA setup options (TOTP, SMS OTP, Email OTP) and cannot proceed to dashboard until enrollment is complete.\r\n\r\n## Test Data\r\n\r\nInternal user without MFA\r\n"},{"id":"TC-113","suite":"authentication","title":"TOTP MFA code successfully validates login","file":"authentication\\TC-113.md","priority":"high","tags":["authentication","mfa","totp","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA"],"has_automation":false,"steps":["Login with valid username and password","System prompts for MFA code","Open authenticator app and retrieve current TOTP code","Enter the 6-digit TOTP code","Submit the code"],"expected_result":"TOTP code is validated successfully. User is authenticated and redirected to dashboard. MFA_SUCCESS event is logged to audit trail.","preconditions":"User has TOTP MFA enrolled (Google Authenticator or Microsoft Authenticator)","content":"---\r\nid: TC-113\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - mfa\r\n  - totp\r\n  - positive\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA\r\nestimated_duration: 4m\r\n---\r\n\r\n# TOTP MFA code successfully validates login\r\n\r\n## Preconditions\r\n\r\nUser has TOTP MFA enrolled (Google Authenticator or Microsoft Authenticator)\r\n\r\n## Steps\r\n\r\n1. Login with valid username and password\r\n2. System prompts for MFA code\r\n3. Open authenticator app and retrieve current TOTP code\r\n4. Enter the 6-digit TOTP code\r\n5. Submit the code\r\n\r\n## Expected Result\r\n\r\nTOTP code is validated successfully. User is authenticated and redirected to dashboard. MFA_SUCCESS event is logged to audit trail.\r\n\r\n## Test Data\r\n\r\nValid TOTP code from authenticator app\r\n"},{"id":"TC-114","suite":"authentication","title":"SMS OTP code sent and valid for 5 minutes","file":"authentication\\TC-114.md","priority":"high","tags":["authentication","mfa","sms","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA"],"has_automation":false,"steps":["Login with valid username and password","Select SMS OTP as MFA method","System sends 6-digit code to registered phone","Receive SMS with code","Enter the code within 5 minutes","Submit the code"],"expected_result":"SMS OTP code is sent to registered phone number. Code is valid for 5 minutes. User is authenticated when correct code is entered within validity period. MFA_SUCCESS event is logged.","preconditions":"User has SMS OTP enrolled with registered phone number","content":"---\r\nid: TC-114\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - mfa\r\n  - sms\r\n  - positive\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA\r\nestimated_duration: 6m\r\n---\r\n\r\n# SMS OTP code sent and valid for 5 minutes\r\n\r\n## Preconditions\r\n\r\nUser has SMS OTP enrolled with registered phone number\r\n\r\n## Steps\r\n\r\n1. Login with valid username and password\r\n2. Select SMS OTP as MFA method\r\n3. System sends 6-digit code to registered phone\r\n4. Receive SMS with code\r\n5. Enter the code within 5 minutes\r\n6. Submit the code\r\n\r\n## Expected Result\r\n\r\nSMS OTP code is sent to registered phone number. Code is valid for 5 minutes. User is authenticated when correct code is entered within validity period. MFA_SUCCESS event is logged.\r\n\r\n## Test Data\r\n\r\nValid SMS OTP code received within 5 minutes\r\n"},{"id":"TC-115","suite":"authentication","title":"Email OTP code sent and valid for 10 minutes","file":"authentication\\TC-115.md","priority":"high","tags":["authentication","mfa","email","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA"],"has_automation":false,"steps":["Login with valid username and password","Select Email OTP as MFA method","System sends 6-digit code to registered email","Check email and retrieve code","Enter the code within 10 minutes","Submit the code"],"expected_result":"Email OTP code is sent to registered email address. Code is valid for 10 minutes. User is authenticated when correct code is entered within validity period. MFA_SUCCESS event is logged.","preconditions":"User has Email OTP enrolled with registered email","content":"---\r\nid: TC-115\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - mfa\r\n  - email\r\n  - positive\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA\r\nestimated_duration: 6m\r\n---\r\n\r\n# Email OTP code sent and valid for 10 minutes\r\n\r\n## Preconditions\r\n\r\nUser has Email OTP enrolled with registered email\r\n\r\n## Steps\r\n\r\n1. Login with valid username and password\r\n2. Select Email OTP as MFA method\r\n3. System sends 6-digit code to registered email\r\n4. Check email and retrieve code\r\n5. Enter the code within 10 minutes\r\n6. Submit the code\r\n\r\n## Expected Result\r\n\r\nEmail OTP code is sent to registered email address. Code is valid for 10 minutes. User is authenticated when correct code is entered within validity period. MFA_SUCCESS event is logged.\r\n\r\n## Test Data\r\n\r\nValid Email OTP code received within 10 minutes\r\n"},{"id":"TC-116","suite":"authentication","title":"MFA session invalidated after 3 failed code attempts","file":"authentication\\TC-116.md","priority":"high","tags":["authentication","mfa","negative","security"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA"],"has_automation":false,"steps":["Login with valid username and password","System prompts for MFA code","Enter incorrect MFA code (1st attempt)","Enter incorrect MFA code (2nd attempt)","Enter incorrect MFA code (3rd attempt)","Observe system behavior"],"expected_result":"After 3 failed MFA code attempts, the MFA session is invalidated. User must restart the login process from the beginning (username/password). MFA_FAILED events are logged for each failed attempt.","preconditions":"User has completed username/password authentication and is at MFA prompt","content":"---\r\nid: TC-116\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - mfa\r\n  - negative\r\n  - security\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Multi-Factor-Authentication-MFA\r\nestimated_duration: 5m\r\n---\r\n\r\n# MFA session invalidated after 3 failed code attempts\r\n\r\n## Preconditions\r\n\r\nUser has completed username/password authentication and is at MFA prompt\r\n\r\n## Steps\r\n\r\n1. Login with valid username and password\r\n2. System prompts for MFA code\r\n3. Enter incorrect MFA code (1st attempt)\r\n4. Enter incorrect MFA code (2nd attempt)\r\n5. Enter incorrect MFA code (3rd attempt)\r\n6. Observe system behavior\r\n\r\n## Expected Result\r\n\r\nAfter 3 failed MFA code attempts, the MFA session is invalidated. User must restart the login process from the beginning (username/password). MFA_FAILED events are logged for each failed attempt.\r\n\r\n## Test Data\r\n\r\nIncorrect MFA codes\r\n"},{"id":"TC-117","suite":"authentication","title":"SSO authentication via Azure AD SAML 2.0","file":"authentication\\TC-117.md","priority":"high","tags":["authentication","sso","saml","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Single-Sign-On-SSO"],"has_automation":false,"steps":["Navigate to login page","Enter email address with SSO-enabled domain","Observe automatic redirect to Azure AD IdP","Authenticate with Azure AD credentials","Complete Azure AD authentication flow","Observe redirect back to application"],"expected_result":"Username/password form is hidden. User is automatically redirected to Azure AD IdP. After successful Azure AD authentication, user is redirected back and authenticated in the application. LOGIN_SUCCESS event is logged.","preconditions":"SSO is enabled for user\u0027s domain, Azure AD tenant is configured","content":"---\r\nid: TC-117\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - sso\r\n  - saml\r\n  - positive\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Single-Sign-On-SSO\r\nestimated_duration: 5m\r\n---\r\n\r\n# SSO authentication via Azure AD SAML 2.0\r\n\r\n## Preconditions\r\n\r\nSSO is enabled for user\u0027s domain, Azure AD tenant is configured\r\n\r\n## Steps\r\n\r\n1. Navigate to login page\r\n2. Enter email address with SSO-enabled domain\r\n3. Observe automatic redirect to Azure AD IdP\r\n4. Authenticate with Azure AD credentials\r\n5. Complete Azure AD authentication flow\r\n6. Observe redirect back to application\r\n\r\n## Expected Result\r\n\r\nUsername/password form is hidden. User is automatically redirected to Azure AD IdP. After successful Azure AD authentication, user is redirected back and authenticated in the application. LOGIN_SUCCESS event is logged.\r\n\r\n## Test Data\r\n\r\nUser with SSO-enabled domain, valid Azure AD credentials\r\n"},{"id":"TC-118","suite":"authentication","title":"SSO auto-provisions new user from SAML assertion","file":"authentication\\TC-118.md","priority":"medium","tags":["authentication","sso","provisioning","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Single-Sign-On-SSO"],"has_automation":false,"steps":["Navigate to login page with user that exists in Azure AD but not locally","Complete SSO authentication via Azure AD","Observe system behavior after successful SSO","Verify new user account is created","Check user role and department assignment"],"expected_result":"If SSO authentication succeeds but user does not exist locally, a new account is provisioned automatically with \u0027Employee\u0027 role and department from SAML assertion. SSO_PROVISIONED event is logged. User is authenticated and can access the system.","preconditions":"SSO is enabled, user exists in Azure AD but not in local system","content":"---\r\nid: TC-118\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - sso\r\n  - provisioning\r\n  - positive\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Single-Sign-On-SSO\r\nestimated_duration: 7m\r\n---\r\n\r\n# SSO auto-provisions new user from SAML assertion\r\n\r\n## Preconditions\r\n\r\nSSO is enabled, user exists in Azure AD but not in local system\r\n\r\n## Steps\r\n\r\n1. Navigate to login page with user that exists in Azure AD but not locally\r\n2. Complete SSO authentication via Azure AD\r\n3. Observe system behavior after successful SSO\r\n4. Verify new user account is created\r\n5. Check user role and department assignment\r\n\r\n## Expected Result\r\n\r\nIf SSO authentication succeeds but user does not exist locally, a new account is provisioned automatically with \u0027Employee\u0027 role and department from SAML assertion. SSO_PROVISIONED event is logged. User is authenticated and can access the system.\r\n\r\n## Test Data\r\n\r\nAzure AD user not in local system, SAML assertion with department attribute\r\n"},{"id":"TC-119","suite":"authentication","title":"Session timeout after 30 minutes of inactivity for internal users","file":"authentication\\TC-119.md","priority":"medium","tags":["authentication","session","timeout"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management"],"has_automation":false,"steps":["Login as internal user","Perform an action to establish active session","Do not interact with the system for 30 minutes","After 30 minutes, attempt to perform an action"],"expected_result":"After 30 minutes of inactivity, session expires. User is redirected to login page. SESSION_EXPIRED event is logged to audit trail.","preconditions":"Internal user is logged in","content":"---\r\nid: TC-119\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - session\r\n  - timeout\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management\r\nestimated_duration: 35m\r\n---\r\n\r\n# Session timeout after 30 minutes of inactivity for internal users\r\n\r\n## Preconditions\r\n\r\nInternal user is logged in\r\n\r\n## Steps\r\n\r\n1. Login as internal user\r\n2. Perform an action to establish active session\r\n3. Do not interact with the system for 30 minutes\r\n4. After 30 minutes, attempt to perform an action\r\n\r\n## Expected Result\r\n\r\nAfter 30 minutes of inactivity, session expires. User is redirected to login page. SESSION_EXPIRED event is logged to audit trail.\r\n\r\n## Test Data\r\n\r\nInternal user session\r\n"},{"id":"TC-120","suite":"authentication","title":"Session timeout after 60 minutes of inactivity for citizens","file":"authentication\\TC-120.md","priority":"medium","tags":["authentication","session","timeout","citizen"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management"],"has_automation":false,"steps":["Login as citizen user","Perform an action to establish active session","Do not interact with the system for 60 minutes","After 60 minutes, attempt to perform an action"],"expected_result":"After 60 minutes of inactivity, session expires. User is redirected to login page. SESSION_EXPIRED event is logged to audit trail.","preconditions":"Citizen user is logged in","content":"---\r\nid: TC-120\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - session\r\n  - timeout\r\n  - citizen\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management\r\nestimated_duration: 1h5m\r\n---\r\n\r\n# Session timeout after 60 minutes of inactivity for citizens\r\n\r\n## Preconditions\r\n\r\nCitizen user is logged in\r\n\r\n## Steps\r\n\r\n1. Login as citizen user\r\n2. Perform an action to establish active session\r\n3. Do not interact with the system for 60 minutes\r\n4. After 60 minutes, attempt to perform an action\r\n\r\n## Expected Result\r\n\r\nAfter 60 minutes of inactivity, session expires. User is redirected to login page. SESSION_EXPIRED event is logged to audit trail.\r\n\r\n## Test Data\r\n\r\nCitizen user session\r\n"},{"id":"TC-121","suite":"authentication","title":"Fourth concurrent session terminates oldest session","file":"authentication\\TC-121.md","priority":"medium","tags":["authentication","session","concurrent"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management"],"has_automation":false,"steps":["Login from Browser 1 (Session 1)","Login from Browser 2 (Session 2)","Login from Browser 3 (Session 3)","Verify all 3 sessions are active","Login from Browser 4 (Session 4)","Attempt to perform action in Browser 1 (oldest session)"],"expected_result":"Maximum 3 concurrent sessions are allowed. When 4th session is initiated, the oldest session (Session 1) is terminated automatically. User in Browser 1 is logged out and must re-authenticate.","preconditions":"User account exists","content":"---\r\nid: TC-121\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - session\r\n  - concurrent\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management\r\nestimated_duration: 8m\r\n---\r\n\r\n# Fourth concurrent session terminates oldest session\r\n\r\n## Preconditions\r\n\r\nUser account exists\r\n\r\n## Steps\r\n\r\n1. Login from Browser 1 (Session 1)\r\n2. Login from Browser 2 (Session 2)\r\n3. Login from Browser 3 (Session 3)\r\n4. Verify all 3 sessions are active\r\n5. Login from Browser 4 (Session 4)\r\n6. Attempt to perform action in Browser 1 (oldest session)\r\n\r\n## Expected Result\r\n\r\nMaximum 3 concurrent sessions are allowed. When 4th session is initiated, the oldest session (Session 1) is terminated automatically. User in Browser 1 is logged out and must re-authenticate.\r\n\r\n## Test Data\r\n\r\nSingle user account, 4 different browsers/devices\r\n"},{"id":"TC-122","suite":"authentication","title":"Session invalidated when IP address changes mid-session","file":"authentication\\TC-122.md","priority":"high","tags":["authentication","session","security","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management"],"has_automation":false,"steps":["Login and establish active session from IP address A","Perform an action to verify session is active","Change IP address (e.g., switch networks, use VPN)","Attempt to perform another action from IP address B"],"expected_result":"Session is invalidated when IP address changes mid-session. User is logged out and must re-authenticate. SESSION_EXPIRED event is logged with IP change noted.","preconditions":"User is logged in with active session","content":"---\r\nid: TC-122\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - session\r\n  - security\r\n  - negative\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management\r\nestimated_duration: 6m\r\n---\r\n\r\n# Session invalidated when IP address changes mid-session\r\n\r\n## Preconditions\r\n\r\nUser is logged in with active session\r\n\r\n## Steps\r\n\r\n1. Login and establish active session from IP address A\r\n2. Perform an action to verify session is active\r\n3. Change IP address (e.g., switch networks, use VPN)\r\n4. Attempt to perform another action from IP address B\r\n\r\n## Expected Result\r\n\r\nSession is invalidated when IP address changes mid-session. User is logged out and must re-authenticate. SESSION_EXPIRED event is logged with IP change noted.\r\n\r\n## Test Data\r\n\r\nActive session, ability to change IP address\r\n"},{"id":"TC-123","suite":"authentication","title":"Remember me extends session to 14 days","file":"authentication\\TC-123.md","priority":"medium","tags":["authentication","session","remember-me","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management"],"has_automation":false,"steps":["Navigate to login page","Enter valid credentials","Check the \u0027Remember me\u0027 checkbox","Click Login","Close browser","Reopen browser after several days (but within 14 days)","Navigate to application"],"expected_result":"\u0027Remember me\u0027 option extends session to 14 days. User remains authenticated across browser sessions within 14-day period. MFA is still required on each new browser even with \u0027Remember me\u0027 enabled.","preconditions":"User account exists","content":"---\r\nid: TC-123\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - session\r\n  - remember-me\r\n  - positive\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Session-Management\r\nestimated_duration: 10m\r\n---\r\n\r\n# Remember me extends session to 14 days\r\n\r\n## Preconditions\r\n\r\nUser account exists\r\n\r\n## Steps\r\n\r\n1. Navigate to login page\r\n2. Enter valid credentials\r\n3. Check the \u0027Remember me\u0027 checkbox\r\n4. Click Login\r\n5. Close browser\r\n6. Reopen browser after several days (but within 14 days)\r\n7. Navigate to application\r\n\r\n## Expected Result\r\n\r\n\u0027Remember me\u0027 option extends session to 14 days. User remains authenticated across browser sessions within 14-day period. MFA is still required on each new browser even with \u0027Remember me\u0027 enabled.\r\n\r\n## Test Data\r\n\r\nValid credentials, \u0027Remember me\u0027 enabled\r\n"},{"id":"TC-124","suite":"authentication","title":"Self-service password reset link sent and valid for 1 hour","file":"authentication\\TC-124.md","priority":"high","tags":["authentication","password-reset","positive"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset"],"has_automation":false,"steps":["Navigate to login page","Click \u0027Forgot Password\u0027 link","Enter registered email address","Submit the form","Check email for password reset link","Click the reset link within 1 hour","Set new password meeting policy requirements"],"expected_result":"Password reset link is sent to registered email and is valid for 1 hour. User can set new password within validity period. PASSWORD_RESET_REQUESTED event is logged when link is requested. PASSWORD_CHANGED event is logged when password is successfully changed.","preconditions":"User account exists with registered email","content":"---\r\nid: TC-124\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - password-reset\r\n  - positive\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset\r\nestimated_duration: 6m\r\n---\r\n\r\n# Self-service password reset link sent and valid for 1 hour\r\n\r\n## Preconditions\r\n\r\nUser account exists with registered email\r\n\r\n## Steps\r\n\r\n1. Navigate to login page\r\n2. Click \u0027Forgot Password\u0027 link\r\n3. Enter registered email address\r\n4. Submit the form\r\n5. Check email for password reset link\r\n6. Click the reset link within 1 hour\r\n7. Set new password meeting policy requirements\r\n\r\n## Expected Result\r\n\r\nPassword reset link is sent to registered email and is valid for 1 hour. User can set new password within validity period. PASSWORD_RESET_REQUESTED event is logged when link is requested. PASSWORD_CHANGED event is logged when password is successfully changed.\r\n\r\n## Test Data\r\n\r\nRegistered email address, new password meeting policy\r\n"},{"id":"TC-125","suite":"authentication","title":"Password reset link can only be used once","file":"authentication\\TC-125.md","priority":"medium","tags":["authentication","password-reset","security","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset"],"has_automation":false,"steps":["Request password reset and receive email with reset link","Click the reset link","Set new password successfully","Attempt to use the same reset link again"],"expected_result":"Password reset link can be used exactly once. After successful password change, the link is invalidated. Second attempt to use the same link fails with error message indicating link has already been used or is invalid.","preconditions":"User has requested password reset and received reset link","content":"---\r\nid: TC-125\r\npriority: medium\r\ntags:\r\n  - authentication\r\n  - password-reset\r\n  - security\r\n  - negative\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset\r\nestimated_duration: 5m\r\n---\r\n\r\n# Password reset link can only be used once\r\n\r\n## Preconditions\r\n\r\nUser has requested password reset and received reset link\r\n\r\n## Steps\r\n\r\n1. Request password reset and receive email with reset link\r\n2. Click the reset link\r\n3. Set new password successfully\r\n4. Attempt to use the same reset link again\r\n\r\n## Expected Result\r\n\r\nPassword reset link can be used exactly once. After successful password change, the link is invalidated. Second attempt to use the same link fails with error message indicating link has already been used or is invalid.\r\n\r\n## Test Data\r\n\r\nPassword reset link\r\n"},{"id":"TC-126","suite":"authentication","title":"All active sessions terminated after password change","file":"authentication\\TC-126.md","priority":"high","tags":["authentication","password-reset","session","security"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset"],"has_automation":false,"steps":["Login from Browser 1 and establish active session","Login from Browser 2 and establish active session","Verify both sessions are active","From Browser 1, change password via password reset flow","Attempt to perform action in Browser 2"],"expected_result":"All active sessions for the user are terminated upon password change. User in Browser 2 is logged out and must re-authenticate with new password. SESSION_EXPIRED events are logged for all terminated sessions.","preconditions":"User has multiple active sessions","content":"---\r\nid: TC-126\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - password-reset\r\n  - session\r\n  - security\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Self-Service-Reset\r\nestimated_duration: 8m\r\n---\r\n\r\n# All active sessions terminated after password change\r\n\r\n## Preconditions\r\n\r\nUser has multiple active sessions\r\n\r\n## Steps\r\n\r\n1. Login from Browser 1 and establish active session\r\n2. Login from Browser 2 and establish active session\r\n3. Verify both sessions are active\r\n4. From Browser 1, change password via password reset flow\r\n5. Attempt to perform action in Browser 2\r\n\r\n## Expected Result\r\n\r\nAll active sessions for the user are terminated upon password change. User in Browser 2 is logged out and must re-authenticate with new password. SESSION_EXPIRED events are logged for all terminated sessions.\r\n\r\n## Test Data\r\n\r\nUser with multiple active sessions\r\n"},{"id":"TC-127","suite":"authentication","title":"Rate limiting blocks IP after 10 login attempts per minute","file":"authentication\\TC-127.md","priority":"high","tags":["authentication","rate-limiting","security","negative"],"component":"authentication","source_refs":["docs/spectra-test-docs/docs/authentication/authentication.md#Rate-Limiting"],"has_automation":false,"steps":["From a single IP address, attempt to login 10 times within 1 minute","Attempt an 11th login from the same IP address","Observe the response"],"expected_result":"After 10 login attempts per minute from the same IP, the 11th attempt is blocked with HTTP 429 response. IP is blocked for 1 hour. Error message indicates rate limit exceeded.","preconditions":"No existing rate limit blocks on test IP address","content":"---\r\nid: TC-127\r\npriority: high\r\ntags:\r\n  - authentication\r\n  - rate-limiting\r\n  - security\r\n  - negative\r\ncomponent: authentication\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/authentication/authentication.md#Rate-Limiting\r\nestimated_duration: 5m\r\n---\r\n\r\n# Rate limiting blocks IP after 10 login attempts per minute\r\n\r\n## Preconditions\r\n\r\nNo existing rate limit blocks on test IP address\r\n\r\n## Steps\r\n\r\n1. From a single IP address, attempt to login 10 times within 1 minute\r\n2. Attempt an 11th login from the same IP address\r\n3. Observe the response\r\n\r\n## Expected Result\r\n\r\nAfter 10 login attempts per minute from the same IP, the 11th attempt is blocked with HTTP 429 response. IP is blocked for 1 hour. Error message indicates rate limit exceeded.\r\n\r\n## Test Data\r\n\r\nSingle IP address, any credentials\r\n"},{"id":"TC-100","suite":"citizen-registration","title":"Complete citizen registration with valid Bulgarian EGN and QES verification","file":"citizen-registration\\TC-100.md","priority":"high","tags":["registration","happy-path","qes","identity-verification"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Registration-Wizard-Steps"],"has_automation":false,"steps":["Navigate to the citizen registration portal","Step 1: Enter valid personal information (First Name: \u0027\u0418\u0432\u0430\u043D\u0027, Last Name: \u0027\u0418\u0432\u0430\u043D\u043E\u0432\u0027, DOB: 15/03/1990, EGN: valid 10-digit with correct checksum, Gender: auto-filled from EGN, Nationality: Bulgarian)","Click \u0027Next\u0027 and verify no validation errors appear","Step 2: Enter email address and mobile phone (\u002B359 888 123 456)","Enter the 6-digit verification code received via email","Enter the 6-digit verification code received via SMS","Click \u0027Next\u0027 after both verifications are complete","Step 3: Select structured address (Region: \u0421\u043E\u0444\u0438\u044F-\u0433\u0440\u0430\u0434, Municipality: \u0421\u0442\u043E\u043B\u0438\u0447\u043D\u0430, City: \u0421\u043E\u0444\u0438\u044F, Postal Code: 1000, Street: \u0027\u0443\u043B. \u0412\u0438\u0442\u043E\u0448\u0430\u0027, Number: \u00271\u0027)","Click \u0027Next\u0027","Step 4: Select \u0027Qualified Electronic Signature (QES/\u041A\u0415\u041F)\u0027 as identity verification method","Sign the verification challenge using Bulgarian eID","Wait for real-time verification to complete successfully","Click \u0027Next\u0027","Step 5: Enter password meeting policy requirements, check \u0027Terms and Conditions\u0027 checkbox","Click \u0027Next\u0027","Step 6: Review all information on confirmation page","Click \u0027Confirm\u0027 to complete registration","Verify welcome email is received","Verify redirect to citizen dashboard"],"expected_result":"Account is created successfully, welcome email is sent without password, citizen is redirected to dashboard with full access to submit applications","preconditions":"User has a valid Bulgarian eID or qualified certificate for QES signing","content":"---\r\nid: TC-100\r\npriority: high\r\ntags:\r\n  - registration\r\n  - happy-path\r\n  - qes\r\n  - identity-verification\r\ncomponent: citizen-registration\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Registration-Wizard-Steps\r\nestimated_duration: 8m\r\n---\r\n\r\n# Complete citizen registration with valid Bulgarian EGN and QES verification\r\n\r\n## Preconditions\r\n\r\nUser has a valid Bulgarian eID or qualified certificate for QES signing\r\n\r\n## Steps\r\n\r\n1. Navigate to the citizen registration portal\r\n2. Step 1: Enter valid personal information (First Name: \u0027\u0418\u0432\u0430\u043D\u0027, Last Name: \u0027\u0418\u0432\u0430\u043D\u043E\u0432\u0027, DOB: 15/03/1990, EGN: valid 10-digit with correct checksum, Gender: auto-filled from EGN, Nationality: Bulgarian)\r\n3. Click \u0027Next\u0027 and verify no validation errors appear\r\n4. Step 2: Enter email address and mobile phone (\u002B359 888 123 456)\r\n5. Enter the 6-digit verification code received via email\r\n6. Enter the 6-digit verification code received via SMS\r\n7. Click \u0027Next\u0027 after both verifications are complete\r\n8. Step 3: Select structured address (Region: \u0421\u043E\u0444\u0438\u044F-\u0433\u0440\u0430\u0434, Municipality: \u0421\u0442\u043E\u043B\u0438\u0447\u043D\u0430, City: \u0421\u043E\u0444\u0438\u044F, Postal Code: 1000, Street: \u0027\u0443\u043B. \u0412\u0438\u0442\u043E\u0448\u0430\u0027, Number: \u00271\u0027)\r\n9. Click \u0027Next\u0027\r\n10. Step 4: Select \u0027Qualified Electronic Signature (QES/\u041A\u0415\u041F)\u0027 as identity verification method\r\n11. Sign the verification challenge using Bulgarian eID\r\n12. Wait for real-time verification to complete successfully\r\n13. Click \u0027Next\u0027\r\n14. Step 5: Enter password meeting policy requirements, check \u0027Terms and Conditions\u0027 checkbox\r\n15. Click \u0027Next\u0027\r\n16. Step 6: Review all information on confirmation page\r\n17. Click \u0027Confirm\u0027 to complete registration\r\n18. Verify welcome email is received\r\n19. Verify redirect to citizen dashboard\r\n\r\n## Expected Result\r\n\r\nAccount is created successfully, welcome email is sent without password, citizen is redirected to dashboard with full access to submit applications\r\n\r\n## Test Data\r\n\r\nEGN: valid 10-digit with checksum, Email: test@example.com, Phone: \u002B359888123456\r\n"},{"id":"TC-101","suite":"citizen-registration","title":"Register citizen with document upload identity verification","file":"citizen-registration\\TC-101.md","priority":"high","tags":["registration","document-upload","ocr","identity-verification"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-4-Identity-Verification"],"has_automation":false,"steps":["Complete Steps 1-3 of registration wizard with valid Bulgarian citizen data","Step 4: Select \u0027Document Upload\u0027 as identity verification method","Upload front side of Bulgarian ID card (JPEG, under 10 MB, meets resolution requirements)","Upload back side of Bulgarian ID card","Wait for OCR processing to extract document number, expiry date, and name","Review OCR results displayed on screen","Confirm OCR results are correct","Verify document is not expired (expiry date is in the future)","Click \u0027Next\u0027","Complete Step 5 (Account Setup) with password and accept Terms and Conditions","Complete Step 6 (Confirmation) and submit registration"],"expected_result":"OCR successfully extracts document details, document is validated as not expired, account is created, welcome email is sent, citizen is redirected to dashboard","preconditions":"User has valid Bulgarian ID card (\u043B\u0438\u0447\u043D\u0430 \u043A\u0430\u0440\u0442\u0430) scans in JPEG/PNG format, minimum 300 DPI or 1000x600 pixels","content":"---\r\nid: TC-101\r\npriority: high\r\ntags:\r\n  - registration\r\n  - document-upload\r\n  - ocr\r\n  - identity-verification\r\ncomponent: citizen-registration\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-4-Identity-Verification\r\nestimated_duration: 7m\r\n---\r\n\r\n# Register citizen with document upload identity verification\r\n\r\n## Preconditions\r\n\r\nUser has valid Bulgarian ID card (\u043B\u0438\u0447\u043D\u0430 \u043A\u0430\u0440\u0442\u0430) scans in JPEG/PNG format, minimum 300 DPI or 1000x600 pixels\r\n\r\n## Steps\r\n\r\n1. Complete Steps 1-3 of registration wizard with valid Bulgarian citizen data\r\n2. Step 4: Select \u0027Document Upload\u0027 as identity verification method\r\n3. Upload front side of Bulgarian ID card (JPEG, under 10 MB, meets resolution requirements)\r\n4. Upload back side of Bulgarian ID card\r\n5. Wait for OCR processing to extract document number, expiry date, and name\r\n6. Review OCR results displayed on screen\r\n7. Confirm OCR results are correct\r\n8. Verify document is not expired (expiry date is in the future)\r\n9. Click \u0027Next\u0027\r\n10. Complete Step 5 (Account Setup) with password and accept Terms and Conditions\r\n11. Complete Step 6 (Confirmation) and submit registration\r\n\r\n## Expected Result\r\n\r\nOCR successfully extracts document details, document is validated as not expired, account is created, welcome email is sent, citizen is redirected to dashboard\r\n\r\n## Test Data\r\n\r\nID card images: front.jpg (2MB, 1200x800px), back.jpg (2MB, 1200x800px), Document expiry: future date\r\n"},{"id":"TC-102","suite":"citizen-registration","title":"Attempt registration with invalid EGN checksum","file":"citizen-registration\\TC-102.md","priority":"medium","tags":["registration","validation","negative","egn"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-1-Personal-Information"],"has_automation":false,"steps":["Navigate to the citizen registration portal","Step 1: Enter personal information with invalid EGN (10 digits but incorrect checksum, e.g., \u00271234567890\u0027)","Tab out of the EGN field to trigger on-blur validation","Observe validation error message","Click \u0027Next\u0027 button","Verify validation error is displayed and highlighted in red"],"expected_result":"EGN field is highlighted in red with error message \u0027Invalid EGN checksum\u0027 or similar. User cannot proceed to Step 2 until a valid EGN is entered. Next button shows all validation errors on click.","preconditions":"None","content":"---\r\nid: TC-102\r\npriority: medium\r\ntags:\r\n  - registration\r\n  - validation\r\n  - negative\r\n  - egn\r\ncomponent: citizen-registration\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-1-Personal-Information\r\nestimated_duration: 3m\r\n---\r\n\r\n# Attempt registration with invalid EGN checksum\r\n\r\n## Preconditions\r\n\r\nNone\r\n\r\n## Steps\r\n\r\n1. Navigate to the citizen registration portal\r\n2. Step 1: Enter personal information with invalid EGN (10 digits but incorrect checksum, e.g., \u00271234567890\u0027)\r\n3. Tab out of the EGN field to trigger on-blur validation\r\n4. Observe validation error message\r\n5. Click \u0027Next\u0027 button\r\n6. Verify validation error is displayed and highlighted in red\r\n\r\n## Expected Result\r\n\r\nEGN field is highlighted in red with error message \u0027Invalid EGN checksum\u0027 or similar. User cannot proceed to Step 2 until a valid EGN is entered. Next button shows all validation errors on click.\r\n\r\n## Test Data\r\n\r\nInvalid EGN: 1234567890 (fails Bulgarian EGN checksum algorithm)\r\n"},{"id":"TC-103","suite":"citizen-registration","title":"Register with email verification code expiration and retry","file":"citizen-registration\\TC-103.md","priority":"medium","tags":["registration","verification","negative","timeout"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-2-Contact-Information"],"has_automation":false,"steps":["Complete Step 1 of registration wizard with valid data","Step 2: Enter valid email address","Receive 6-digit verification code via email","Wait for 16 minutes (code expires after 15 minutes)","Attempt to enter the expired verification code","Observe error message indicating code has expired","Click \u0027Request new code\u0027 button","Receive new 6-digit verification code via email","Enter the new code within 15 minutes","Verify email is marked as verified","Complete phone verification","Proceed to Step 3"],"expected_result":"Expired code is rejected with clear error message. User can request a new code (up to 3 times per hour). New code is sent and accepted when entered within 15-minute window. Email verification status is preserved.","preconditions":"None","content":"---\r\nid: TC-103\r\npriority: medium\r\ntags:\r\n  - registration\r\n  - verification\r\n  - negative\r\n  - timeout\r\ncomponent: citizen-registration\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-2-Contact-Information\r\nestimated_duration: 20m\r\n---\r\n\r\n# Register with email verification code expiration and retry\r\n\r\n## Preconditions\r\n\r\nNone\r\n\r\n## Steps\r\n\r\n1. Complete Step 1 of registration wizard with valid data\r\n2. Step 2: Enter valid email address\r\n3. Receive 6-digit verification code via email\r\n4. Wait for 16 minutes (code expires after 15 minutes)\r\n5. Attempt to enter the expired verification code\r\n6. Observe error message indicating code has expired\r\n7. Click \u0027Request new code\u0027 button\r\n8. Receive new 6-digit verification code via email\r\n9. Enter the new code within 15 minutes\r\n10. Verify email is marked as verified\r\n11. Complete phone verification\r\n12. Proceed to Step 3\r\n\r\n## Expected Result\r\n\r\nExpired code is rejected with clear error message. User can request a new code (up to 3 times per hour). New code is sent and accepted when entered within 15-minute window. Email verification status is preserved.\r\n\r\n## Test Data\r\n\r\nEmail: test@example.com, First code expires after 15 minutes, Second code valid\r\n"},{"id":"TC-104","suite":"citizen-registration","title":"Attempt registration with duplicate EGN for active account","file":"citizen-registration\\TC-104.md","priority":"high","tags":["registration","duplicate-detection","negative","egn"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Duplicate-Detection"],"has_automation":false,"steps":["Navigate to the citizen registration portal","Complete Steps 1-5 of registration wizard using the same EGN as existing active account (\u00278001011234\u0027)","Step 6: Review information and click \u0027Confirm\u0027","Observe duplicate detection check before account creation","Verify error message is displayed"],"expected_result":"System detects duplicate EGN and displays message: \u0027An account with this identification number already exists. Please use the password reset function if you cannot access your account.\u0027 Account creation is blocked.","preconditions":"An active citizen account already exists with EGN \u00278001011234\u0027 (example valid EGN)","content":"---\r\nid: TC-104\r\npriority: high\r\ntags:\r\n  - registration\r\n  - duplicate-detection\r\n  - negative\r\n  - egn\r\ncomponent: citizen-registration\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Duplicate-Detection\r\nestimated_duration: 6m\r\n---\r\n\r\n# Attempt registration with duplicate EGN for active account\r\n\r\n## Preconditions\r\n\r\nAn active citizen account already exists with EGN \u00278001011234\u0027 (example valid EGN)\r\n\r\n## Steps\r\n\r\n1. Navigate to the citizen registration portal\r\n2. Complete Steps 1-5 of registration wizard using the same EGN as existing active account (\u00278001011234\u0027)\r\n3. Step 6: Review information and click \u0027Confirm\u0027\r\n4. Observe duplicate detection check before account creation\r\n5. Verify error message is displayed\r\n\r\n## Expected Result\r\n\r\nSystem detects duplicate EGN and displays message: \u0027An account with this identification number already exists. Please use the password reset function if you cannot access your account.\u0027 Account creation is blocked.\r\n\r\n## Test Data\r\n\r\nDuplicate EGN: 8001011234 (matches existing active account)\r\n"},{"id":"TC-105","suite":"citizen-registration","title":"Register citizen with in-person verification and resume wizard after 12 hours","file":"citizen-registration\\TC-105.md","priority":"medium","tags":["registration","wizard-persistence","in-person-verification"],"component":"citizen-registration","source_refs":["docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Wizard-Persistence","docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-4-Identity-Verification"],"has_automation":false,"steps":["Navigate to the citizen registration portal","Complete Step 1 (Personal Information) with valid data","Complete Step 2 (Contact Information) with email and phone verification","Note that verified email/phone tokens are preserved","Close the browser without completing registration","Wait 12 hours","Return to the registration portal in a new browser session","Verify wizard resumes from Step 3 (last completed step was Step 2)","Verify email and phone verification statuses are still marked as verified (no re-verification required)","Complete Step 3 (Address)","Step 4: Select \u0027In-person Verification\u0027 as identity verification method","Complete Step 5 (Account Setup) and Step 6 (Confirmation)","Submit registration"],"expected_result":"Wizard progress is restored from local storage after 12 hours (within 24-hour window). Verified email/phone tokens are preserved. Account is created in \u0027Pending Verification\u0027 status with limited access. Reminder emails are scheduled for 7, 14, and 21 days.","preconditions":"None","content":"---\r\nid: TC-105\r\npriority: medium\r\ntags:\r\n  - registration\r\n  - wizard-persistence\r\n  - in-person-verification\r\ncomponent: citizen-registration\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Wizard-Persistence\r\n  - docs/spectra-test-docs/docs/citizen-registration/citizen-registration.md#Step-4-Identity-Verification\r\nestimated_duration: 15m\r\n---\r\n\r\n# Register citizen with in-person verification and resume wizard after 12 hours\r\n\r\n## Preconditions\r\n\r\nNone\r\n\r\n## Steps\r\n\r\n1. Navigate to the citizen registration portal\r\n2. Complete Step 1 (Personal Information) with valid data\r\n3. Complete Step 2 (Contact Information) with email and phone verification\r\n4. Note that verified email/phone tokens are preserved\r\n5. Close the browser without completing registration\r\n6. Wait 12 hours\r\n7. Return to the registration portal in a new browser session\r\n8. Verify wizard resumes from Step 3 (last completed step was Step 2)\r\n9. Verify email and phone verification statuses are still marked as verified (no re-verification required)\r\n10. Complete Step 3 (Address)\r\n11. Step 4: Select \u0027In-person Verification\u0027 as identity verification method\r\n12. Complete Step 5 (Account Setup) and Step 6 (Confirmation)\r\n13. Submit registration\r\n\r\n## Expected Result\r\n\r\nWizard progress is restored from local storage after 12 hours (within 24-hour window). Verified email/phone tokens are preserved. Account is created in \u0027Pending Verification\u0027 status with limited access. Reminder emails are scheduled for 7, 14, and 21 days.\r\n\r\n## Test Data\r\n\r\nEmail: test@example.com, Phone: \u002B359888123456, Resume time: 12 hours after initial start\r\n"},{"id":"TC-100","suite":"payment-processing","title":"Successful card payment with 3D Secure authentication","file":"payment-processing\\TC-100.md","priority":"high","tags":["payment","card-payment","3d-secure","happy-path"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Methods","docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow","docs/spectra-test-docs/docs/payments/payment-processing.md#Receipts"],"has_automation":false,"steps":["Navigate to the payment page for the submitted application","Select \u0027Bank Card (Visa/Mastercard)\u0027 as the payment method","Click \u0027Proceed to Payment\u0027","Verify redirect to ePay.bg payment gateway","Enter valid card details (card number, expiry, CVV)","Complete 3D Secure authentication (enter OTP or use biometric)","Verify callback redirects back to the system","Check payment status changes to PAID","Verify application status changes to IN_PROCESSING","Verify receipt PDF is generated and available for download","Verify confirmation email is sent with receipt attached"],"expected_result":"Payment is successfully processed. Application status changes to IN_PROCESSING. Receipt is generated with unique receipt number (R-YYYY-XXXXXX), contains masked card number (last 4 digits only), digital signature, and all required fields. Citizen receives confirmation email with PDF receipt.","preconditions":"Citizen has submitted a service application with a fee of at least 0.50 BGN. Citizen has a valid Visa or Mastercard.","content":"---\r\nid: TC-100\r\npriority: high\r\ntags:\r\n  - payment\r\n  - card-payment\r\n  - 3d-secure\r\n  - happy-path\r\ncomponent: payment-processing\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Methods\r\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow\r\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Receipts\r\nestimated_duration: 8m\r\n---\r\n\r\n# Successful card payment with 3D Secure authentication\r\n\r\n## Preconditions\r\n\r\nCitizen has submitted a service application with a fee of at least 0.50 BGN. Citizen has a valid Visa or Mastercard.\r\n\r\n## Steps\r\n\r\n1. Navigate to the payment page for the submitted application\r\n2. Select \u0027Bank Card (Visa/Mastercard)\u0027 as the payment method\r\n3. Click \u0027Proceed to Payment\u0027\r\n4. Verify redirect to ePay.bg payment gateway\r\n5. Enter valid card details (card number, expiry, CVV)\r\n6. Complete 3D Secure authentication (enter OTP or use biometric)\r\n7. Verify callback redirects back to the system\r\n8. Check payment status changes to PAID\r\n9. Verify application status changes to IN_PROCESSING\r\n10. Verify receipt PDF is generated and available for download\r\n11. Verify confirmation email is sent with receipt attached\r\n\r\n## Expected Result\r\n\r\nPayment is successfully processed. Application status changes to IN_PROCESSING. Receipt is generated with unique receipt number (R-YYYY-XXXXXX), contains masked card number (last 4 digits only), digital signature, and all required fields. Citizen receives confirmation email with PDF receipt.\r\n\r\n## Test Data\r\n\r\nService: Certificate of Birth, Fee: 5.00 BGN, Card: Visa ending in 1234\r\n"},{"id":"TC-101","suite":"payment-processing","title":"Bank transfer payment with exact amount match","file":"payment-processing\\TC-101.md","priority":"medium","tags":["payment","bank-transfer","payment-matching"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Methods","docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow"],"has_automation":false,"steps":["Submit a service application (e.g., Address Registration, 3.00 BGN)","Select \u0027Bank Transfer\u0027 as payment method","Verify system generates unique payment reference in format PR-YYYYMMDD-XXXXXX","Verify payment reference and bank details are displayed on screen","Verify confirmation email is sent with payment reference and bank details","Simulate bank transfer arrival with exact amount (3.00 BGN) and correct payment reference","Verify payment is matched automatically","Verify payment status changes to PAID","Verify application status changes to IN_PROCESSING","Verify receipt is generated and emailed to citizen"],"expected_result":"System generates unique payment reference (PR-YYYYMMDD-XXXXXX). Payment reference and bank details are displayed and emailed. When bank transfer arrives with exact amount and correct reference, payment is automatically matched. Application proceeds to IN_PROCESSING status. Receipt is generated.","preconditions":"Citizen has submitted a service application requiring payment. Bank transfer is selected as payment method.","content":"---\r\nid: TC-101\r\npriority: medium\r\ntags:\r\n  - payment\r\n  - bank-transfer\r\n  - payment-matching\r\ncomponent: payment-processing\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Methods\r\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow\r\nestimated_duration: 6m\r\n---\r\n\r\n# Bank transfer payment with exact amount match\r\n\r\n## Preconditions\r\n\r\nCitizen has submitted a service application requiring payment. Bank transfer is selected as payment method.\r\n\r\n## Steps\r\n\r\n1. Submit a service application (e.g., Address Registration, 3.00 BGN)\r\n2. Select \u0027Bank Transfer\u0027 as payment method\r\n3. Verify system generates unique payment reference in format PR-YYYYMMDD-XXXXXX\r\n4. Verify payment reference and bank details are displayed on screen\r\n5. Verify confirmation email is sent with payment reference and bank details\r\n6. Simulate bank transfer arrival with exact amount (3.00 BGN) and correct payment reference\r\n7. Verify payment is matched automatically\r\n8. Verify payment status changes to PAID\r\n9. Verify application status changes to IN_PROCESSING\r\n10. Verify receipt is generated and emailed to citizen\r\n\r\n## Expected Result\r\n\r\nSystem generates unique payment reference (PR-YYYYMMDD-XXXXXX). Payment reference and bank details are displayed and emailed. When bank transfer arrives with exact amount and correct reference, payment is automatically matched. Application proceeds to IN_PROCESSING status. Receipt is generated.\r\n\r\n## Test Data\r\n\r\nService: Address Registration, Fee: 3.00 BGN, Payment Reference: PR-20260320-123456\r\n"},{"id":"TC-102","suite":"payment-processing","title":"Fee waiver automatically applied for eligible citizen","file":"payment-processing\\TC-102.md","priority":"high","tags":["payment","fee-waiver","eligibility"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Fee-Structure","docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow"],"has_automation":false,"steps":["Log in as a citizen over 70 years old","Submit an application for Certificate of Birth (standard fee: 5.00 BGN)","Verify system calculates the fee","Verify fee waiver is automatically applied","Verify fee is set to 0.00 BGN","Verify waiver reason is logged (e.g., \u0027Free for citizens over 70\u0027)","Verify citizen proceeds without payment step","Verify application status changes directly to IN_PROCESSING","Verify no receipt is generated (since no payment was made)"],"expected_result":"System automatically detects citizen eligibility for fee waiver. Fee is set to 0.00 BGN. Waiver reason is logged. Citizen bypasses payment step entirely. Application proceeds directly to IN_PROCESSING status without requiring payment or generating a receipt.","preconditions":"Citizen profile indicates eligibility for fee waiver (e.g., age over 70 for birth certificate, or disabled person with TELK \u2265 50% for address registration).","content":"---\r\nid: TC-102\r\npriority: high\r\ntags:\r\n  - payment\r\n  - fee-waiver\r\n  - eligibility\r\ncomponent: payment-processing\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Fee-Structure\r\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow\r\nestimated_duration: 5m\r\n---\r\n\r\n# Fee waiver automatically applied for eligible citizen\r\n\r\n## Preconditions\r\n\r\nCitizen profile indicates eligibility for fee waiver (e.g., age over 70 for birth certificate, or disabled person with TELK \u2265 50% for address registration).\r\n\r\n## Steps\r\n\r\n1. Log in as a citizen over 70 years old\r\n2. Submit an application for Certificate of Birth (standard fee: 5.00 BGN)\r\n3. Verify system calculates the fee\r\n4. Verify fee waiver is automatically applied\r\n5. Verify fee is set to 0.00 BGN\r\n6. Verify waiver reason is logged (e.g., \u0027Free for citizens over 70\u0027)\r\n7. Verify citizen proceeds without payment step\r\n8. Verify application status changes directly to IN_PROCESSING\r\n9. Verify no receipt is generated (since no payment was made)\r\n\r\n## Expected Result\r\n\r\nSystem automatically detects citizen eligibility for fee waiver. Fee is set to 0.00 BGN. Waiver reason is logged. Citizen bypasses payment step entirely. Application proceeds directly to IN_PROCESSING status without requiring payment or generating a receipt.\r\n\r\n## Test Data\r\n\r\nCitizen: Age 72, Service: Certificate of Birth, Waiver Condition: Free for citizens over 70\r\n"},{"id":"TC-103","suite":"payment-processing","title":"Payment timeout handling and retry mechanism","file":"payment-processing\\TC-103.md","priority":"high","tags":["payment","error-handling","timeout","retry"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Timeout-and-Error-Handling"],"has_automation":false,"steps":["Submit a service application with a fee","Select \u0027Bank Card (Visa/Mastercard)\u0027 as payment method","Click \u0027Proceed to Payment\u0027","Simulate ePay.bg gateway timeout (no response within 30 seconds)","Verify transaction is marked as PENDING","Verify citizen sees message: \u0027Payment is being processed. You will receive a confirmation email within 15 minutes.\u0027","Wait 15 minutes (or simulate time passage)","Verify system queries ePay.bg for transaction status","Simulate ePay.bg confirms failure","Verify application returns to \u0027Awaiting Payment\u0027 status","Verify citizen can retry payment","Attempt payment again and verify retry is allowed"],"expected_result":"When ePay.bg does not respond within 30 seconds, transaction is marked PENDING and citizen sees processing message. After 15 minutes without callback, system queries ePay.bg. If failure is confirmed, application returns to \u0027Awaiting Payment\u0027 status. Citizen can retry payment.","preconditions":"Citizen has submitted a service application and selected card payment. ePay.bg gateway is configured to simulate timeout (no response within 30 seconds).","content":"---\r\nid: TC-103\r\npriority: high\r\ntags:\r\n  - payment\r\n  - error-handling\r\n  - timeout\r\n  - retry\r\ncomponent: payment-processing\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Timeout-and-Error-Handling\r\nestimated_duration: 10m\r\n---\r\n\r\n# Payment timeout handling and retry mechanism\r\n\r\n## Preconditions\r\n\r\nCitizen has submitted a service application and selected card payment. ePay.bg gateway is configured to simulate timeout (no response within 30 seconds).\r\n\r\n## Steps\r\n\r\n1. Submit a service application with a fee\r\n2. Select \u0027Bank Card (Visa/Mastercard)\u0027 as payment method\r\n3. Click \u0027Proceed to Payment\u0027\r\n4. Simulate ePay.bg gateway timeout (no response within 30 seconds)\r\n5. Verify transaction is marked as PENDING\r\n6. Verify citizen sees message: \u0027Payment is being processed. You will receive a confirmation email within 15 minutes.\u0027\r\n7. Wait 15 minutes (or simulate time passage)\r\n8. Verify system queries ePay.bg for transaction status\r\n9. Simulate ePay.bg confirms failure\r\n10. Verify application returns to \u0027Awaiting Payment\u0027 status\r\n11. Verify citizen can retry payment\r\n12. Attempt payment again and verify retry is allowed\r\n\r\n## Expected Result\r\n\r\nWhen ePay.bg does not respond within 30 seconds, transaction is marked PENDING and citizen sees processing message. After 15 minutes without callback, system queries ePay.bg. If failure is confirmed, application returns to \u0027Awaiting Payment\u0027 status. Citizen can retry payment.\r\n\r\n## Test Data\r\n\r\nService: Certificate of Marital Status, Fee: 5.00 BGN\r\n"},{"id":"TC-104","suite":"payment-processing","title":"Refund processing for rejected application","file":"payment-processing\\TC-104.md","priority":"medium","tags":["payment","refund","card-refund"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds"],"has_automation":false,"steps":["Submit a service application and complete card payment (e.g., Criminal Record Certificate, 5.00 BGN)","Verify payment status is PAID and application is IN_PROCESSING","Administrator rejects the application with a reason","Verify refund is automatically triggered","Verify refund is processed back to the original card","Verify refund amount equals the original payment amount (5.00 BGN)","Verify citizen is notified of refund via email","Verify refund processing time is stated as 5-10 business days","Verify refund transaction is logged in audit trail"],"expected_result":"When application is rejected, refund is automatically processed. For card payments, refund goes back to the original card. Refund amount equals original payment. Citizen receives email notification. Processing time is 5-10 business days. Transaction is fully audited.","preconditions":"Citizen has submitted and paid for a service application using a bank card. Application has been rejected by administration.","content":"---\r\nid: TC-104\r\npriority: medium\r\ntags:\r\n  - payment\r\n  - refund\r\n  - card-refund\r\ncomponent: payment-processing\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds\r\nestimated_duration: 7m\r\n---\r\n\r\n# Refund processing for rejected application\r\n\r\n## Preconditions\r\n\r\nCitizen has submitted and paid for a service application using a bank card. Application has been rejected by administration.\r\n\r\n## Steps\r\n\r\n1. Submit a service application and complete card payment (e.g., Criminal Record Certificate, 5.00 BGN)\r\n2. Verify payment status is PAID and application is IN_PROCESSING\r\n3. Administrator rejects the application with a reason\r\n4. Verify refund is automatically triggered\r\n5. Verify refund is processed back to the original card\r\n6. Verify refund amount equals the original payment amount (5.00 BGN)\r\n7. Verify citizen is notified of refund via email\r\n8. Verify refund processing time is stated as 5-10 business days\r\n9. Verify refund transaction is logged in audit trail\r\n\r\n## Expected Result\r\n\r\nWhen application is rejected, refund is automatically processed. For card payments, refund goes back to the original card. Refund amount equals original payment. Citizen receives email notification. Processing time is 5-10 business days. Transaction is fully audited.\r\n\r\n## Test Data\r\n\r\nService: Criminal Record Certificate, Fee: 5.00 BGN, Payment Method: Visa ending in 5678, Rejection Reason: Incomplete documentation\r\n"},{"id":"TC-105","suite":"payment-processing","title":"Multiple failed payment attempts trigger lockout","file":"payment-processing\\TC-105.md","priority":"high","tags":["payment","error-handling","security","lockout","negative"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Timeout-and-Error-Handling"],"has_automation":false,"steps":["Submit a service application with a fee (e.g., Certificate of Birth, 5.00 BGN)","Select \u0027Bank Card (Visa/Mastercard)\u0027 as payment method","Attempt payment with invalid card details (first attempt)","Verify payment fails and application remains in \u0027Awaiting Payment\u0027 status","Attempt payment with invalid card details (second attempt)","Verify payment fails again","Attempt payment with invalid card details (third attempt)","Verify payment fails for the third time","Verify application is locked for 1 hour","Verify citizen sees message: \u0027Multiple payment attempts detected. Please try again later or contact support.\u0027","Attempt payment again immediately","Verify payment is blocked and lockout message is displayed","Wait 1 hour (or simulate time passage)","Verify citizen can attempt payment again after lockout period expires"],"expected_result":"After 3 failed payment attempts, application is locked for 1 hour. Citizen sees message: \u0027Multiple payment attempts detected. Please try again later or contact support.\u0027 Payment attempts during lockout period are blocked. After 1 hour, citizen can retry payment.","preconditions":"Citizen has submitted a service application requiring payment. Citizen will attempt payment with invalid card details.","content":"---\r\nid: TC-105\r\npriority: high\r\ntags:\r\n  - payment\r\n  - error-handling\r\n  - security\r\n  - lockout\r\n  - negative\r\ncomponent: payment-processing\r\nsource_refs:\r\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Timeout-and-Error-Handling\r\nestimated_duration: 8m\r\n---\r\n\r\n# Multiple failed payment attempts trigger lockout\r\n\r\n## Preconditions\r\n\r\nCitizen has submitted a service application requiring payment. Citizen will attempt payment with invalid card details.\r\n\r\n## Steps\r\n\r\n1. Submit a service application with a fee (e.g., Certificate of Birth, 5.00 BGN)\r\n2. Select \u0027Bank Card (Visa/Mastercard)\u0027 as payment method\r\n3. Attempt payment with invalid card details (first attempt)\r\n4. Verify payment fails and application remains in \u0027Awaiting Payment\u0027 status\r\n5. Attempt payment with invalid card details (second attempt)\r\n6. Verify payment fails again\r\n7. Attempt payment with invalid card details (third attempt)\r\n8. Verify payment fails for the third time\r\n9. Verify application is locked for 1 hour\r\n10. Verify citizen sees message: \u0027Multiple payment attempts detected. Please try again later or contact support.\u0027\r\n11. Attempt payment again immediately\r\n12. Verify payment is blocked and lockout message is displayed\r\n13. Wait 1 hour (or simulate time passage)\r\n14. Verify citizen can attempt payment again after lockout period expires\r\n\r\n## Expected Result\r\n\r\nAfter 3 failed payment attempts, application is locked for 1 hour. Citizen sees message: \u0027Multiple payment attempts detected. Please try again later or contact support.\u0027 Payment attempts during lockout period are blocked. After 1 hour, citizen can retry payment.\r\n\r\n## Test Data\r\n\r\nService: Certificate of Birth, Fee: 5.00 BGN, Invalid Card: 4111111111111112 (test card that fails)\r\n"}],"coverage":{"nodes":[{"id":"doc:docs_spectra-test-docs_docs_authentication_authentication_md#Account-Lockout","type":"document","name":"authentication.md#Account-Lockout","path":"docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout","status":"partial"},{"id":"doc:docs_spectra-test-docs_docs_authentication_authentication_md#Administrator-Reset","type":"document","name":"authentication.md#Administrator-Reset","path":"docs/spectra-test-docs/docs/authentication/aut
