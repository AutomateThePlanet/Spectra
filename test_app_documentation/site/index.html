tration.md#Step-4-Identity-Verification\nestimated_duration: 15m\n---\n\n# Register citizen with in-person verification and resume wizard after 12 hours\n\n## Preconditions\n\nNone\n\n## Steps\n\n1. Navigate to the citizen registration portal\n2. Complete Step 1 (Personal Information) with valid data\n3. Complete Step 2 (Contact Information) with email and phone verification\n4. Note that verified email/phone tokens are preserved\n5. Close the browser without completing registration\n6. Wait 12 hours\n7. Return to the registration portal in a new browser session\n8. Verify wizard resumes from Step 3 (last completed step was Step 2)\n9. Verify email and phone verification statuses are still marked as verified (no re-verification required)\n10. Complete Step 3 (Address)\n11. Step 4: Select \u0027In-person Verification\u0027 as identity verification method\n12. Complete Step 5 (Account Setup) and Step 6 (Confirmation)\n13. Submit registration\n\n## Expected Result\n\nWizard progress is restored from local storage after 12 hours (within 24-hour window). Verified email/phone tokens are preserved. Account is created in \u0027Pending Verification\u0027 status with limited access. Reminder emails are scheduled for 7, 14, and 21 days.\n\n## Test Data\n\nEmail: test@example.com, Phone: \u002B359888123456, Resume time: 12 hours after initial start\n"},{"id":"TC-100","suite":"notifications","title":"Verify email notification sent when application is submitted","file":"TC-100.md","priority":"high","tags":["notifications","email","application-workflow"],"component":"notification-system","source_refs":["docs/spectra-test-docs/docs/notifications/notification-system.md#Notification-Types-and-Triggers"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Log in as a citizen","Navigate to application submission page","Complete and submit an application for any government service","Check the email inbox for the registered email address","Verify the email notification is received"],"expected_result":"Email notification is sent from no-reply@egovportal.bg with subject and body using the \u0027application_submitted\u0027 template. Email includes application reference number, service name, and unsubscribe link. Email is in HTML format with plain-text fallback.","preconditions":"Citizen has a registered account with verified email address. Email notifications are enabled in preferences.","content":"---\nid: TC-100\npriority: high\ntags:\n  - notifications\n  - email\n  - application-workflow\ncomponent: notification-system\nrequirements: [REQ-023]\nsource_refs:\n  - docs/spectra-test-docs/docs/notifications/notification-system.md#Notification-Types-and-Triggers\nestimated_duration: 5m\n---\n\n# Verify email notification sent when application is submitted\n\n## Preconditions\n\nCitizen has a registered account with verified email address. Email notifications are enabled in preferences.\n\n## Steps\n\n1. Log in as a citizen\n2. Navigate to application submission page\n3. Complete and submit an application for any government service\n4. Check the email inbox for the registered email address\n5. Verify the email notification is received\n\n## Expected Result\n\nEmail notification is sent from no-reply@egovportal.bg with subject and body using the \u0027application_submitted\u0027 template. Email includes application reference number, service name, and unsubscribe link. Email is in HTML format with plain-text fallback.\n\n## Test Data\n\nValid citizen account with email address\n"},{"id":"TC-101","suite":"notifications","title":"Verify SMS notification truncation when message exceeds character limit","file":"TC-101.md","priority":"medium","tags":["notifications","sms","truncation"],"component":"notification-system","source_refs":["docs/spectra-test-docs/docs/notifications/notification-system.md#SMS"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Configure a test notification template with content exceeding SMS character limits (\u003E160 Latin or \u003E70 Cyrillic)","Trigger a notification event that uses this template (e.g., payment received with long service name)","Check the SMS received on the citizen\u0027s registered phone number","Verify the SMS content is truncated","Verify the truncated message ends with \u0027...\u0027 and includes a link to the full notification in the portal"],"expected_result":"SMS message is truncated to 160 characters (Latin) or 70 characters (Cyrillic). The truncated message ends with \u0027...\u0027 followed by a link to view the full notification in the portal.","preconditions":"Citizen has SMS notifications enabled. A notification event is triggered that generates SMS content exceeding 160 characters (Latin) or 70 characters (Cyrillic).","content":"---\nid: TC-101\npriority: medium\ntags:\n  - notifications\n  - sms\n  - truncation\ncomponent: notification-system\nrequirements: [REQ-024]\nsource_refs:\n  - docs/spectra-test-docs/docs/notifications/notification-system.md#SMS\nestimated_duration: 7m\n---\n\n# Verify SMS notification truncation when message exceeds character limit\n\n## Preconditions\n\nCitizen has SMS notifications enabled. A notification event is triggered that generates SMS content exceeding 160 characters (Latin) or 70 characters (Cyrillic).\n\n## Steps\n\n1. Configure a test notification template with content exceeding SMS character limits (\u003E160 Latin or \u003E70 Cyrillic)\n2. Trigger a notification event that uses this template (e.g., payment received with long service name)\n3. Check the SMS received on the citizen\u0027s registered phone number\n4. Verify the SMS content is truncated\n5. Verify the truncated message ends with \u0027...\u0027 and includes a link to the full notification in the portal\n\n## Expected Result\n\nSMS message is truncated to 160 characters (Latin) or 70 characters (Cyrillic). The truncated message ends with \u0027...\u0027 followed by a link to view the full notification in the portal.\n\n## Test Data\n\nNotification template with content exceeding character limits\n"},{"id":"TC-102","suite":"notifications","title":"Verify notification preferences take effect immediately after change","file":"TC-102.md","priority":"high","tags":["notifications","preferences","configuration"],"component":"notification-system","source_refs":["docs/spectra-test-docs/docs/notifications/notification-system.md#Notification-Preferences"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Navigate to notification preferences page","Disable email notifications for a specific category (e.g., \u0027Application status change\u0027)","Save the preference changes","Trigger an application status change event immediately","Check email inbox and in-app notifications","Verify email is NOT received but in-app notification is still delivered"],"expected_result":"Preference changes take effect immediately. No email notification is sent for the disabled category. In-app notification is still delivered as it cannot be disabled. Notifications already queued before the preference change are still sent.","preconditions":"Citizen is logged in with all notification channels enabled by default.","content":"---\nid: TC-102\npriority: high\ntags:\n  - notifications\n  - preferences\n  - configuration\ncomponent: notification-system\nrequirements: [REQ-027]\nsource_refs:\n  - docs/spectra-test-docs/docs/notifications/notification-system.md#Notification-Preferences\nestimated_duration: 6m\n---\n\n# Verify notification preferences take effect immediately after change\n\n## Preconditions\n\nCitizen is logged in with all notification channels enabled by default.\n\n## Steps\n\n1. Navigate to notification preferences page\n2. Disable email notifications for a specific category (e.g., \u0027Application status change\u0027)\n3. Save the preference changes\n4. Trigger an application status change event immediately\n5. Check email inbox and in-app notifications\n6. Verify email is NOT received but in-app notification is still delivered\n\n## Expected Result\n\nPreference changes take effect immediately. No email notification is sent for the disabled category. In-app notification is still delivered as it cannot be disabled. Notifications already queued before the preference change are still sent.\n\n## Test Data\n\nValid citizen account with active application\n"},{"id":"TC-103","suite":"notifications","title":"Verify notification retry logic with exponential backoff for failed email","file":"TC-103.md","priority":"medium","tags":["notifications","email","retry","error-handling"],"component":"notification-system","source_refs":["docs/spectra-test-docs/docs/notifications/notification-system.md#Retry-Logic"],"has_automation":false,"steps":["Configure email service to fail on first 3 attempts","Trigger a notification event that sends an email (e.g., application submitted)","Monitor retry attempts and delays","Verify 1st retry occurs after 1 minute","Verify 2nd retry occurs after 5 minutes from 1st retry","Verify 3rd retry occurs after 30 minutes from 2nd retry","Allow email service to succeed on 4th attempt","Verify email is successfully delivered"],"expected_result":"Failed email notifications are retried with exponential backoff: 1st retry after 1 minute, 2nd after 5 minutes, 3rd after 30 minutes, 4th after 2 hours, 5th after 12 hours. Email is marked as DELIVERED after successful retry. Retry delays match documented schedule.","preconditions":"Email service is configured to simulate failures. A notification event is ready to be triggered.","content":"---\nid: TC-103\npriority: medium\ntags:\n  - notifications\n  - email\n  - retry\n  - error-handling\ncomponent: notification-system\nrequirements: [REQ-026]\nsource_refs:\n  - docs/spectra-test-docs/docs/notifications/notification-system.md#Retry-Logic\nestimated_duration: 10m\n---\n\n# Verify notification retry logic with exponential backoff for failed email\n\n## Preconditions\n\nEmail service is configured to simulate failures. A notification event is ready to be triggered.\n\n## Steps\n\n1. Configure email service to fail on first 3 attempts\n2. Trigger a notification event that sends an email (e.g., application submitted)\n3. Monitor retry attempts and delays\n4. Verify 1st retry occurs after 1 minute\n5. Verify 2nd retry occurs after 5 minutes from 1st retry\n6. Verify 3rd retry occurs after 30 minutes from 2nd retry\n7. Allow email service to succeed on 4th attempt\n8. Verify email is successfully delivered\n\n## Expected Result\n\nFailed email notifications are retried with exponential backoff: 1st retry after 1 minute, 2nd after 5 minutes, 3rd after 30 minutes, 4th after 2 hours, 5th after 12 hours. Email is marked as DELIVERED after successful retry. Retry delays match documented schedule.\n\n## Test Data\n\nEmail service with simulated failures\n"},{"id":"TC-104","suite":"notifications","title":"Verify rate limiting blocks non-critical notifications when limit exceeded","file":"TC-104.md","priority":"medium","tags":["notifications","rate-limiting","error-handling"],"component":"notification-system","source_refs":["docs/spectra-test-docs/docs/notifications/notification-system.md#Rate-Limiting"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Payments\\RefundTests.cs","has_automation":true,"steps":["Trigger 10 email notifications within one hour for the same citizen (e.g., multiple application status changes)","Verify all 10 emails are delivered","Trigger an 11th non-critical email notification within the same hour","Check email inbox","Verify the 11th email is NOT immediately delivered","Wait for the next available window (after 1 hour from first email)","Verify the queued email is now delivered"],"expected_result":"Rate limiting enforces maximum 10 emails per hour per citizen. The 11th non-critical email is queued and delivered in the next available window. Critical notifications (password reset, account locked) would bypass rate limits.","preconditions":"Citizen account is registered. Multiple notification events can be triggered rapidly.","content":"---\nid: TC-104\npriority: medium\ntags:\n  - notifications\n  - rate-limiting\n  - error-handling\ncomponent: notification-system\nrequirements: [REQ-026]\nsource_refs:\n  - docs/spectra-test-docs/docs/notifications/notification-system.md#Rate-Limiting\nestimated_duration: 8m\n---\n\n# Verify rate limiting blocks non-critical notifications when limit exceeded\n\n## Preconditions\n\nCitizen account is registered. Multiple notification events can be triggered rapidly.\n\n## Steps\n\n1. Trigger 10 email notifications within one hour for the same citizen (e.g., multiple application status changes)\n2. Verify all 10 emails are delivered\n3. Trigger an 11th non-critical email notification within the same hour\n4. Check email inbox\n5. Verify the 11th email is NOT immediately delivered\n6. Wait for the next available window (after 1 hour from first email)\n7. Verify the queued email is now delivered\n\n## Expected Result\n\nRate limiting enforces maximum 10 emails per hour per citizen. The 11th non-critical email is queued and delivered in the next available window. Critical notifications (password reset, account locked) would bypass rate limits.\n\n## Test Data\n\nCitizen account with multiple notification triggers\n"},{"id":"TC-105","suite":"notifications","title":"Verify critical notifications bypass Do Not Disturb mode","file":"TC-105.md","priority":"high","tags":["notifications","do-not-disturb","critical","security"],"component":"notification-system","source_refs":["docs/spectra-test-docs/docs/notifications/notification-system.md#Do-Not-Disturb"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Log in as citizen and enable Do Not Disturb mode","Set DND schedule to suppress notifications during current time window","Trigger a non-critical notification (e.g., application status change)","Verify push and SMS notifications are suppressed","Trigger a critical notification (e.g., password reset or account locked)","Check all notification channels (email, SMS, push, in-app)","Verify critical notification is delivered on all applicable channels despite DND mode"],"expected_result":"Non-critical notifications are suppressed during DND mode (no push/SMS). Critical notifications (password reset, account locked) bypass DND mode and are delivered on all applicable channels. Email and in-app notifications are delivered but without sound/vibration on mobile during DND.","preconditions":"Citizen has enabled Do Not Disturb mode with scheduled hours (e.g., 22:00-08:00). Current time is within DND window.","content":"---\nid: TC-105\npriority: high\ntags:\n  - notifications\n  - do-not-disturb\n  - critical\n  - security\ncomponent: notification-system\nrequirements: [REQ-025]\nsource_refs:\n  - docs/spectra-test-docs/docs/notifications/notification-system.md#Do-Not-Disturb\nestimated_duration: 7m\n---\n\n# Verify critical notifications bypass Do Not Disturb mode\n\n## Preconditions\n\nCitizen has enabled Do Not Disturb mode with scheduled hours (e.g., 22:00-08:00). Current time is within DND window.\n\n## Steps\n\n1. Log in as citizen and enable Do Not Disturb mode\n2. Set DND schedule to suppress notifications during current time window\n3. Trigger a non-critical notification (e.g., application status change)\n4. Verify push and SMS notifications are suppressed\n5. Trigger a critical notification (e.g., password reset or account locked)\n6. Check all notification channels (email, SMS, push, in-app)\n7. Verify critical notification is delivered on all applicable channels despite DND mode\n\n## Expected Result\n\nNon-critical notifications are suppressed during DND mode (no push/SMS). Critical notifications (password reset, account locked) bypass DND mode and are delivered on all applicable channels. Email and in-app notifications are delivered but without sound/vibration on mobile during DND.\n\n## Test Data\n\nCitizen account with DND enabled and scheduled\n"},{"id":"TC-100","suite":"payment-processing","title":"Successful card payment with 3D Secure authentication","file":"TC-100.md","priority":"high","tags":["payment","card-payment","3d-secure","happy-path"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Methods","docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow","docs/spectra-test-docs/docs/payments/payment-processing.md#Receipts"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Navigate to the payment page for the submitted application","Select \u0027Bank Card (Visa/Mastercard)\u0027 as the payment method","Click \u0027Proceed to Payment\u0027","Verify redirect to ePay.bg payment gateway","Enter valid card details (card number, expiry, CVV)","Complete 3D Secure authentication (enter OTP or use biometric)","Verify callback redirects back to the system","Check payment status changes to PAID","Verify application status changes to IN_PROCESSING","Verify receipt PDF is generated and available for download","Verify confirmation email is sent with receipt attached"],"expected_result":"Payment is successfully processed. Application status changes to IN_PROCESSING. Receipt is generated with unique receipt number (R-YYYY-XXXXXX), contains masked card number (last 4 digits only), digital signature, and all required fields. Citizen receives confirmation email with PDF receipt.","preconditions":"Citizen has submitted a service application with a fee of at least 0.50 BGN. Citizen has a valid Visa or Mastercard.","content":"---\nid: TC-100\npriority: high\ntags:\n  - payment\n  - card-payment\n  - 3d-secure\n  - happy-path\ncomponent: payment-processing\nrequirements: [REQ-017]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Methods\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Receipts\nestimated_duration: 8m\n---\n\n# Successful card payment with 3D Secure authentication\n\n## Preconditions\n\nCitizen has submitted a service application with a fee of at least 0.50 BGN. Citizen has a valid Visa or Mastercard.\n\n## Steps\n\n1. Navigate to the payment page for the submitted application\n2. Select \u0027Bank Card (Visa/Mastercard)\u0027 as the payment method\n3. Click \u0027Proceed to Payment\u0027\n4. Verify redirect to ePay.bg payment gateway\n5. Enter valid card details (card number, expiry, CVV)\n6. Complete 3D Secure authentication (enter OTP or use biometric)\n7. Verify callback redirects back to the system\n8. Check payment status changes to PAID\n9. Verify application status changes to IN_PROCESSING\n10. Verify receipt PDF is generated and available for download\n11. Verify confirmation email is sent with receipt attached\n\n## Expected Result\n\nPayment is successfully processed. Application status changes to IN_PROCESSING. Receipt is generated with unique receipt number (R-YYYY-XXXXXX), contains masked card number (last 4 digits only), digital signature, and all required fields. Citizen receives confirmation email with PDF receipt.\n\n## Test Data\n\nService: Certificate of Birth, Fee: 5.00 BGN, Card: Visa ending in 1234\n"},{"id":"TC-101","suite":"payment-processing","title":"Bank transfer payment with exact amount match","file":"TC-101.md","priority":"medium","tags":["payment","bank-transfer","payment-matching"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Methods","docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Submit a service application (e.g., Address Registration, 3.00 BGN)","Select \u0027Bank Transfer\u0027 as payment method","Verify system generates unique payment reference in format PR-YYYYMMDD-XXXXXX","Verify payment reference and bank details are displayed on screen","Verify confirmation email is sent with payment reference and bank details","Simulate bank transfer arrival with exact amount (3.00 BGN) and correct payment reference","Verify payment is matched automatically","Verify payment status changes to PAID","Verify application status changes to IN_PROCESSING","Verify receipt is generated and emailed to citizen"],"expected_result":"System generates unique payment reference (PR-YYYYMMDD-XXXXXX). Payment reference and bank details are displayed and emailed. When bank transfer arrives with exact amount and correct reference, payment is automatically matched. Application proceeds to IN_PROCESSING status. Receipt is generated.","preconditions":"Citizen has submitted a service application requiring payment. Bank transfer is selected as payment method.","content":"---\nid: TC-101\npriority: medium\ntags:\n  - payment\n  - bank-transfer\n  - payment-matching\ncomponent: payment-processing\nrequirements: [REQ-017]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Methods\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow\nestimated_duration: 6m\n---\n\n# Bank transfer payment with exact amount match\n\n## Preconditions\n\nCitizen has submitted a service application requiring payment. Bank transfer is selected as payment method.\n\n## Steps\n\n1. Submit a service application (e.g., Address Registration, 3.00 BGN)\n2. Select \u0027Bank Transfer\u0027 as payment method\n3. Verify system generates unique payment reference in format PR-YYYYMMDD-XXXXXX\n4. Verify payment reference and bank details are displayed on screen\n5. Verify confirmation email is sent with payment reference and bank details\n6. Simulate bank transfer arrival with exact amount (3.00 BGN) and correct payment reference\n7. Verify payment is matched automatically\n8. Verify payment status changes to PAID\n9. Verify application status changes to IN_PROCESSING\n10. Verify receipt is generated and emailed to citizen\n\n## Expected Result\n\nSystem generates unique payment reference (PR-YYYYMMDD-XXXXXX). Payment reference and bank details are displayed and emailed. When bank transfer arrives with exact amount and correct reference, payment is automatically matched. Application proceeds to IN_PROCESSING status. Receipt is generated.\n\n## Test Data\n\nService: Address Registration, Fee: 3.00 BGN, Payment Reference: PR-20260320-123456\n"},{"id":"TC-102","suite":"payment-processing","title":"Fee waiver automatically applied for eligible citizen","file":"TC-102.md","priority":"high","tags":["payment","fee-waiver","eligibility"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Fee-Structure","docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Log in as a citizen over 70 years old","Submit an application for Certificate of Birth (standard fee: 5.00 BGN)","Verify system calculates the fee","Verify fee waiver is automatically applied","Verify fee is set to 0.00 BGN","Verify waiver reason is logged (e.g., \u0027Free for citizens over 70\u0027)","Verify citizen proceeds without payment step","Verify application status changes directly to IN_PROCESSING","Verify no receipt is generated (since no payment was made)"],"expected_result":"System automatically detects citizen eligibility for fee waiver. Fee is set to 0.00 BGN. Waiver reason is logged. Citizen bypasses payment step entirely. Application proceeds directly to IN_PROCESSING status without requiring payment or generating a receipt.","preconditions":"Citizen profile indicates eligibility for fee waiver (e.g., age over 70 for birth certificate, or disabled person with TELK \u2265 50% for address registration).","content":"---\nid: TC-102\npriority: high\ntags:\n  - payment\n  - fee-waiver\n  - eligibility\ncomponent: payment-processing\nrequirements: [REQ-019]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Fee-Structure\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Payment-Flow\nestimated_duration: 5m\n---\n\n# Fee waiver automatically applied for eligible citizen\n\n## Preconditions\n\nCitizen profile indicates eligibility for fee waiver (e.g., age over 70 for birth certificate, or disabled person with TELK \u2265 50% for address registration).\n\n## Steps\n\n1. Log in as a citizen over 70 years old\n2. Submit an application for Certificate of Birth (standard fee: 5.00 BGN)\n3. Verify system calculates the fee\n4. Verify fee waiver is automatically applied\n5. Verify fee is set to 0.00 BGN\n6. Verify waiver reason is logged (e.g., \u0027Free for citizens over 70\u0027)\n7. Verify citizen proceeds without payment step\n8. Verify application status changes directly to IN_PROCESSING\n9. Verify no receipt is generated (since no payment was made)\n\n## Expected Result\n\nSystem automatically detects citizen eligibility for fee waiver. Fee is set to 0.00 BGN. Waiver reason is logged. Citizen bypasses payment step entirely. Application proceeds directly to IN_PROCESSING status without requiring payment or generating a receipt.\n\n## Test Data\n\nCitizen: Age 72, Service: Certificate of Birth, Waiver Condition: Free for citizens over 70\n"},{"id":"TC-103","suite":"payment-processing","title":"Payment timeout handling and retry mechanism","file":"TC-103.md","priority":"high","tags":["payment","error-handling","timeout","retry"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Timeout-and-Error-Handling"],"has_automation":false,"steps":["Submit a service application with a fee","Select \u0027Bank Card (Visa/Mastercard)\u0027 as payment method","Click \u0027Proceed to Payment\u0027","Simulate ePay.bg gateway timeout (no response within 30 seconds)","Verify transaction is marked as PENDING","Verify citizen sees message: \u0027Payment is being processed. You will receive a confirmation email within 15 minutes.\u0027","Wait 15 minutes (or simulate time passage)","Verify system queries ePay.bg for transaction status","Simulate ePay.bg confirms failure","Verify application returns to \u0027Awaiting Payment\u0027 status","Verify citizen can retry payment","Attempt payment again and verify retry is allowed"],"expected_result":"When ePay.bg does not respond within 30 seconds, transaction is marked PENDING and citizen sees processing message. After 15 minutes without callback, system queries ePay.bg. If failure is confirmed, application returns to \u0027Awaiting Payment\u0027 status. Citizen can retry payment.","preconditions":"Citizen has submitted a service application and selected card payment. ePay.bg gateway is configured to simulate timeout (no response within 30 seconds).","content":"---\nid: TC-103\npriority: high\ntags:\n  - payment\n  - error-handling\n  - timeout\n  - retry\ncomponent: payment-processing\nrequirements: [REQ-022]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Timeout-and-Error-Handling\nestimated_duration: 10m\n---\n\n# Payment timeout handling and retry mechanism\n\n## Preconditions\n\nCitizen has submitted a service application and selected card payment. ePay.bg gateway is configured to simulate timeout (no response within 30 seconds).\n\n## Steps\n\n1. Submit a service application with a fee\n2. Select \u0027Bank Card (Visa/Mastercard)\u0027 as payment method\n3. Click \u0027Proceed to Payment\u0027\n4. Simulate ePay.bg gateway timeout (no response within 30 seconds)\n5. Verify transaction is marked as PENDING\n6. Verify citizen sees message: \u0027Payment is being processed. You will receive a confirmation email within 15 minutes.\u0027\n7. Wait 15 minutes (or simulate time passage)\n8. Verify system queries ePay.bg for transaction status\n9. Simulate ePay.bg confirms failure\n10. Verify application returns to \u0027Awaiting Payment\u0027 status\n11. Verify citizen can retry payment\n12. Attempt payment again and verify retry is allowed\n\n## Expected Result\n\nWhen ePay.bg does not respond within 30 seconds, transaction is marked PENDING and citizen sees processing message. After 15 minutes without callback, system queries ePay.bg. If failure is confirmed, application returns to \u0027Awaiting Payment\u0027 status. Citizen can retry payment.\n\n## Test Data\n\nService: Certificate of Marital Status, Fee: 5.00 BGN\n"},{"id":"TC-104","suite":"payment-processing","title":"Refund processing for rejected application","file":"TC-104.md","priority":"medium","tags":["payment","refund","card-refund"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Payments\\RefundTests.cs","has_automation":true,"steps":["Submit a service application and complete card payment (e.g., Criminal Record Certificate, 5.00 BGN)","Verify payment status is PAID and application is IN_PROCESSING","Administrator rejects the application with a reason","Verify refund is automatically triggered","Verify refund is processed back to the original card","Verify refund amount equals the original payment amount (5.00 BGN)","Verify citizen is notified of refund via email","Verify refund processing time is stated as 5-10 business days","Verify refund transaction is logged in audit trail"],"expected_result":"When application is rejected, refund is automatically processed. For card payments, refund goes back to the original card. Refund amount equals original payment. Citizen receives email notification. Processing time is 5-10 business days. Transaction is fully audited.","preconditions":"Citizen has submitted and paid for a service application using a bank card. Application has been rejected by administration.","content":"---\nid: TC-104\npriority: medium\ntags:\n  - payment\n  - refund\n  - card-refund\ncomponent: payment-processing\nrequirements: [REQ-021]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds\nestimated_duration: 7m\n---\n\n# Refund processing for rejected application\n\n## Preconditions\n\nCitizen has submitted and paid for a service application using a bank card. Application has been rejected by administration.\n\n## Steps\n\n1. Submit a service application and complete card payment (e.g., Criminal Record Certificate, 5.00 BGN)\n2. Verify payment status is PAID and application is IN_PROCESSING\n3. Administrator rejects the application with a reason\n4. Verify refund is automatically triggered\n5. Verify refund is processed back to the original card\n6. Verify refund amount equals the original payment amount (5.00 BGN)\n7. Verify citizen is notified of refund via email\n8. Verify refund processing time is stated as 5-10 business days\n9. Verify refund transaction is logged in audit trail\n\n## Expected Result\n\nWhen application is rejected, refund is automatically processed. For card payments, refund goes back to the original card. Refund amount equals original payment. Citizen receives email notification. Processing time is 5-10 business days. Transaction is fully audited.\n\n## Test Data\n\nService: Criminal Record Certificate, Fee: 5.00 BGN, Payment Method: Visa ending in 5678, Rejection Reason: Incomplete documentation\n"},{"id":"TC-105","suite":"payment-processing","title":"Multiple failed payment attempts trigger lockout","file":"TC-105.md","priority":"high","tags":["payment","error-handling","security","lockout","negative"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Timeout-and-Error-Handling"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Submit a service application with a fee (e.g., Certificate of Birth, 5.00 BGN)","Select \u0027Bank Card (Visa/Mastercard)\u0027 as payment method","Attempt payment with invalid card details (first attempt)","Verify payment fails and application remains in \u0027Awaiting Payment\u0027 status","Attempt payment with invalid card details (second attempt)","Verify payment fails again","Attempt payment with invalid card details (third attempt)","Verify payment fails for the third time","Verify application is locked for 1 hour","Verify citizen sees message: \u0027Multiple payment attempts detected. Please try again later or contact support.\u0027","Attempt payment again immediately","Verify payment is blocked and lockout message is displayed","Wait 1 hour (or simulate time passage)","Verify citizen can attempt payment again after lockout period expires"],"expected_result":"After 3 failed payment attempts, application is locked for 1 hour. Citizen sees message: \u0027Multiple payment attempts detected. Please try again later or contact support.\u0027 Payment attempts during lockout period are blocked. After 1 hour, citizen can retry payment.","preconditions":"Citizen has submitted a service application requiring payment. Citizen will attempt payment with invalid card details.","content":"---\nid: TC-105\npriority: high\ntags:\n  - payment\n  - error-handling\n  - security\n  - lockout\n  - negative\ncomponent: payment-processing\nrequirements: [REQ-022]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Timeout-and-Error-Handling\nestimated_duration: 8m\n---\n\n# Multiple failed payment attempts trigger lockout\n\n## Preconditions\n\nCitizen has submitted a service application requiring payment. Citizen will attempt payment with invalid card details.\n\n## Steps\n\n1. Submit a service application with a fee (e.g., Certificate of Birth, 5.00 BGN)\n2. Select \u0027Bank Card (Visa/Mastercard)\u0027 as payment method\n3. Attempt payment with invalid card details (first attempt)\n4. Verify payment fails and application remains in \u0027Awaiting Payment\u0027 status\n5. Attempt payment with invalid card details (second attempt)\n6. Verify payment fails again\n7. Attempt payment with invalid card details (third attempt)\n8. Verify payment fails for the third time\n9. Verify application is locked for 1 hour\n10. Verify citizen sees message: \u0027Multiple payment attempts detected. Please try again later or contact support.\u0027\n11. Attempt payment again immediately\n12. Verify payment is blocked and lockout message is displayed\n13. Wait 1 hour (or simulate time passage)\n14. Verify citizen can attempt payment again after lockout period expires\n\n## Expected Result\n\nAfter 3 failed payment attempts, application is locked for 1 hour. Citizen sees message: \u0027Multiple payment attempts detected. Please try again later or contact support.\u0027 Payment attempts during lockout period are blocked. After 1 hour, citizen can retry payment.\n\n## Test Data\n\nService: Certificate of Birth, Fee: 5.00 BGN, Invalid Card: 4111111111111112 (test card that fails)\n"},{"id":"TC-100","suite":"refunds","title":"Refund card payment after application rejection","file":"TC-100.md","priority":"high","tags":["refund","card-payment","application-rejection"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Log in as administrator with payments.refund permission","Navigate to the rejected application","Click \u0027Process Refund\u0027 button","Verify refund method is set to \u0027Original Card\u0027 (last 4 digits displayed)","Confirm refund amount matches original payment","Submit refund request","Verify refund status changes to \u0027Processing\u0027","Verify citizen receives email notification about refund"],"expected_result":"Refund is processed back to the original card. System displays message \u0027Refund will be processed within 5-10 business days\u0027. Payment status changes to REFUNDED. Refund transaction is logged in audit trail.","preconditions":"Citizen has submitted an application with card payment (Visa/Mastercard) that has been rejected by administration","content":"---\nid: TC-100\npriority: high\ntags:\n  - refund\n  - card-payment\n  - application-rejection\ncomponent: payment-processing\nrequirements: [REQ-021]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds\nestimated_duration: 5m\n---\n\n# Refund card payment after application rejection\n\n## Preconditions\n\nCitizen has submitted an application with card payment (Visa/Mastercard) that has been rejected by administration\n\n## Steps\n\n1. Log in as administrator with payments.refund permission\n2. Navigate to the rejected application\n3. Click \u0027Process Refund\u0027 button\n4. Verify refund method is set to \u0027Original Card\u0027 (last 4 digits displayed)\n5. Confirm refund amount matches original payment\n6. Submit refund request\n7. Verify refund status changes to \u0027Processing\u0027\n8. Verify citizen receives email notification about refund\n\n## Expected Result\n\nRefund is processed back to the original card. System displays message \u0027Refund will be processed within 5-10 business days\u0027. Payment status changes to REFUNDED. Refund transaction is logged in audit trail.\n\n## Test Data\n\nApplication with card payment: 50.00 BGN, Card ending in 1234\n"},{"id":"TC-101","suite":"refunds","title":"Refund bank transfer payment for cancelled service within 24 hours","file":"TC-101.md","priority":"high","tags":["refund","bank-transfer","cancellation"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Log in as citizen who made bank transfer payment","Navigate to \u0027My Applications\u0027 dashboard","Select the paid application (within 24 hours of payment)","Click \u0027Cancel Application\u0027 button","System prompts for IBAN for refund","Enter valid IBAN (BG80BNBG96611020345678)","Confirm cancellation and refund request","Verify application status changes to \u0027Cancelled\u0027","Verify refund request is created with status \u0027Pending\u0027"],"expected_result":"Refund is processed to the provided IBAN. System displays message \u0027Refund will be processed within 3-5 business days\u0027. Citizen receives confirmation email with refund details. Payment status changes to REFUNDED.","preconditions":"Citizen has paid via bank transfer and wants to cancel service within 24 hours of payment","content":"---\nid: TC-101\npriority: high\ntags:\n  - refund\n  - bank-transfer\n  - cancellation\ncomponent: payment-processing\nrequirements: [REQ-021]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds\nestimated_duration: 6m\n---\n\n# Refund bank transfer payment for cancelled service within 24 hours\n\n## Preconditions\n\nCitizen has paid via bank transfer and wants to cancel service within 24 hours of payment\n\n## Steps\n\n1. Log in as citizen who made bank transfer payment\n2. Navigate to \u0027My Applications\u0027 dashboard\n3. Select the paid application (within 24 hours of payment)\n4. Click \u0027Cancel Application\u0027 button\n5. System prompts for IBAN for refund\n6. Enter valid IBAN (BG80BNBG96611020345678)\n7. Confirm cancellation and refund request\n8. Verify application status changes to \u0027Cancelled\u0027\n9. Verify refund request is created with status \u0027Pending\u0027\n\n## Expected Result\n\nRefund is processed to the provided IBAN. System displays message \u0027Refund will be processed within 3-5 business days\u0027. Citizen receives confirmation email with refund details. Payment status changes to REFUNDED.\n\n## Test Data\n\nBank transfer payment: 5.00 BGN, Payment reference: PR-20260320-123456\n"},{"id":"TC-102","suite":"refunds","title":"Partial refund for expedited fee only","file":"TC-102.md","priority":"medium","tags":["refund","partial-refund","expedited-fee"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Log in as administrator with payments.refund permission","Navigate to application with expedited fee payment (e.g., Certificate of Birth: 5.00 BGN base \u002B 15.00 BGN expedited = 20.00 BGN total)","Select \u0027Process Partial Refund\u0027","Enter refund amount: 15.00 BGN","Enter reason: \u0027Expedited processing not available, refunding expedited fee\u0027","Verify system shows breakdown: Original: 20.00 BGN, Refund: 15.00 BGN, Retained: 5.00 BGN","Confirm partial refund","Verify payment status shows \u0027Partially Refunded\u0027"],"expected_result":"Partial refund of 15.00 BGN is processed. Payment record shows original amount (20.00 BGN), refunded amount (15.00 BGN), and net amount (5.00 BGN). Citizen receives email with partial refund details. Application continues processing with standard fee.","preconditions":"Application was paid with expedited fee but will be processed as standard service","content":"---\nid: TC-102\npriority: medium\ntags:\n  - refund\n  - partial-refund\n  - expedited-fee\ncomponent: payment-processing\nrequirements: [REQ-021]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds\nestimated_duration: 7m\n---\n\n# Partial refund for expedited fee only\n\n## Preconditions\n\nApplication was paid with expedited fee but will be processed as standard service\n\n## Steps\n\n1. Log in as administrator with payments.refund permission\n2. Navigate to application with expedited fee payment (e.g., Certificate of Birth: 5.00 BGN base \u002B 15.00 BGN expedited = 20.00 BGN total)\n3. Select \u0027Process Partial Refund\u0027\n4. Enter refund amount: 15.00 BGN\n5. Enter reason: \u0027Expedited processing not available, refunding expedited fee\u0027\n6. Verify system shows breakdown: Original: 20.00 BGN, Refund: 15.00 BGN, Retained: 5.00 BGN\n7. Confirm partial refund\n8. Verify payment status shows \u0027Partially Refunded\u0027\n\n## Expected Result\n\nPartial refund of 15.00 BGN is processed. Payment record shows original amount (20.00 BGN), refunded amount (15.00 BGN), and net amount (5.00 BGN). Citizen receives email with partial refund details. Application continues processing with standard fee.\n\n## Test Data\n\nCard payment: 20.00 BGN (5.00 base \u002B 15.00 expedited), Card ending in 5678\n"},{"id":"TC-103","suite":"refunds","title":"Refund voucher payment as credit note","file":"TC-103.md","priority":"medium","tags":["refund","voucher","credit-note"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds"],"has_automation":false,"steps":["Log in as administrator with payments.refund permission","Navigate to rejected application paid with voucher","Click \u0027Process Refund\u0027","Verify refund method shows \u0027Credit Note\u0027","Confirm refund amount matches original payment","Submit refund request","Verify credit note is generated with unique code","Verify credit note validity period is 12 months from issue date","Verify citizen receives email with credit note code and instructions"],"expected_result":"Credit note is issued with 12-month validity. Credit note code is displayed (format: CN-YYYYMMDD-XXXXXX). Citizen can use credit note for any future service. Payment status changes to REFUNDED. Credit note details are stored in system.","preconditions":"Citizen has paid via ePay/EasyPay voucher and application is rejected","content":"---\nid: TC-103\npriority: medium\ntags:\n  - refund\n  - voucher\n  - credit-note\ncomponent: payment-processing\nrequirements: [REQ-021]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds\nestimated_duration: 5m\n---\n\n# Refund voucher payment as credit note\n\n## Preconditions\n\nCitizen has paid via ePay/EasyPay voucher and application is rejected\n\n## Steps\n\n1. Log in as administrator with payments.refund permission\n2. Navigate to rejected application paid with voucher\n3. Click \u0027Process Refund\u0027\n4. Verify refund method shows \u0027Credit Note\u0027\n5. Confirm refund amount matches original payment\n6. Submit refund request\n7. Verify credit note is generated with unique code\n8. Verify credit note validity period is 12 months from issue date\n9. Verify citizen receives email with credit note code and instructions\n\n## Expected Result\n\nCredit note is issued with 12-month validity. Credit note code is displayed (format: CN-YYYYMMDD-XXXXXX). Citizen can use credit note for any future service. Payment status changes to REFUNDED. Credit note details are stored in system.\n\n## Test Data\n\nVoucher payment: 5.00 BGN, Voucher code: EP-20260320-789012\n"},{"id":"TC-104","suite":"refunds","title":"Reject refund request exceeding original payment amount","file":"TC-104.md","priority":"high","tags":["refund","negative-test","validation"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Payments\\RefundTests.cs","has_automation":true,"steps":["Log in as administrator with payments.refund permission","Navigate to application with payment (e.g., 50.00 BGN)","Select \u0027Process Refund\u0027","Attempt to enter refund amount greater than original payment (e.g., 75.00 BGN)","Click \u0027Submit Refund\u0027","Observe system validation"],"expected_result":"System rejects the refund request with error message: \u0027Refund amount cannot exceed original payment amount of 50.00 BGN\u0027. Refund is not processed. Payment status remains unchanged. No refund transaction is created.","preconditions":"Application has been paid and is eligible for refund","content":"---\nid: TC-104\npriority: high\ntags:\n  - refund\n  - negative-test\n  - validation\ncomponent: payment-processing\nrequirements: [REQ-021]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds\nestimated_duration: 4m\n---\n\n# Reject refund request exceeding original payment amount\n\n## Preconditions\n\nApplication has been paid and is eligible for refund\n\n## Steps\n\n1. Log in as administrator with payments.refund permission\n2. Navigate to application with payment (e.g., 50.00 BGN)\n3. Select \u0027Process Refund\u0027\n4. Attempt to enter refund amount greater than original payment (e.g., 75.00 BGN)\n5. Click \u0027Submit Refund\u0027\n6. Observe system validation\n\n## Expected Result\n\nSystem rejects the refund request with error message: \u0027Refund amount cannot exceed original payment amount of 50.00 BGN\u0027. Refund is not processed. Payment status remains unchanged. No refund transaction is created.\n\n## Test Data\n\nOriginal payment: 50.00 BGN, Attempted refund: 75.00 BGN\n"},{"id":"TC-105","suite":"refunds","title":"Reject cash refund without original receipt","file":"TC-105.md","priority":"medium","tags":["refund","cash-payment","negative-test"],"component":"payment-processing","source_refs":["docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Citizen visits government office to request cash refund","Clerk logs in with payments.refund permission","Clerk navigates to the application requiring refund","Clerk selects \u0027Process Cash Refund\u0027","System prompts for original receipt number","Clerk attempts to process refund without entering receipt number","Clerk clicks \u0027Submit Refund\u0027","Observe system validation"],"expected_result":"System rejects refund request with error: \u0027Original receipt number is required for cash refunds\u0027. Refund cannot be processed. Clerk must verify citizen has original receipt and enter receipt number to proceed. Payment status remains unchanged.","preconditions":"Application was paid in cash at government office and is now eligible for refund","content":"---\nid: TC-105\npriority: medium\ntags:\n  - refund\n  - cash-payment\n  - negative-test\ncomponent: payment-processing\nrequirements: [REQ-021]\nsource_refs:\n  - docs/spectra-test-docs/docs/payments/payment-processing.md#Refunds\nestimated_duration: 5m\n---\n\n# Reject cash refund without original receipt\n\n## Preconditions\n\nApplication was paid in cash at government office and is now eligible for refund\n\n## Steps\n\n1. Citizen visits government office to request cash refund\n2. Clerk logs in with payments.refund permission\n3. Clerk navigates to the application requiring refund\n4. Clerk selects \u0027Process Cash Refund\u0027\n5. System prompts for original receipt number\n6. Clerk attempts to process refund without entering receipt number\n7. Clerk clicks \u0027Submit Refund\u0027\n8. Observe system validation\n\n## Expected Result\n\nSystem rejects refund request with error: \u0027Original receipt number is required for cash refunds\u0027. Refund cannot be processed. Clerk must verify citizen has original receipt and enter receipt number to proceed. Payment status remains unchanged.\n\n## Test Data\n\nCash payment: 5.00 BGN, Receipt number: (not provided)\n"},{"id":"TC-100","suite":"search","title":"Quick search autocomplete with minimum 3 characters","file":"TC-100.md","priority":"high","tags":["search","autocomplete","ui"],"component":"global-search","source_refs":["docs/spectra-test-docs/docs/search/search-filtering.md#Quick-Search"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Locate the global search bar in the top navigation","Type 2 characters into the search field","Observe that no autocomplete suggestions appear","Type a third character (total 3 characters)","Wait 300ms for debounce","Observe the autocomplete dropdown"],"expected_result":"Autocomplete suggestions appear after typing 3 or more characters with a 300ms debounce. Suggestions are grouped by category (Applications, Citizens, Documents) with maximum 5 suggestions per category (15 total). Each suggestion shows title/name, category icon, and brief context line. Response time is under 200ms.","preconditions":"User is authenticated and on any page with the global search bar in top navigation","content":"---\nid: TC-100\npriority: high\ntags:\n  - search\n  - autocomplete\n  - ui\ncomponent: global-search\nrequirements: [REQ-028]\nsource_refs:\n  - docs/spectra-test-docs/docs/search/search-filtering.md#Quick-Search\nestimated_duration: 3m\nautomated_by:\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/LoginTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Notifications/NotificationTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Payments/CardPaymentTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Search/SearchTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Search/SearchTests.cs\n---\n\n# Quick search autocomplete with minimum 3 characters\n\n## Preconditions\n\nUser is authenticated and on any page with the global search bar in top navigation\n\n## Steps\n\n1. Locate the global search bar in the top navigation\n2. Type 2 characters into the search field\n3. Observe that no autocomplete suggestions appear\n4. Type a third character (total 3 characters)\n5. Wait 300ms for debounce\n6. Observe the autocomplete dropdown\n\n## Expected Result\n\nAutocomplete suggestions appear after typing 3 or more characters with a 300ms debounce. Suggestions are grouped by category (Applications, Citizens, Documents) with maximum 5 suggestions per category (15 total). Each suggestion shows title/name, category icon, and brief context line. Response time is under 200ms.\n\n## Test Data\n\nSearch query: \u0027per\u0027 (3 characters)\n"},{"id":"TC-101","suite":"search","title":"Search using exact phrase syntax with quotes","file":"TC-101.md","priority":"medium","tags":["search","query-syntax","exact-match"],"component":"search-query","source_refs":["docs/spectra-test-docs/docs/search/search-filtering.md#Search-Query-Syntax"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Navigate to the global search bar","Enter search query: \u0022building permit\u0022 (with quotes)","Press Enter to execute search","Review search results on the results page","Verify that only results containing the exact phrase \u0027building permit\u0027 are returned","Verify that results with \u0027building\u0027 and \u0027permit\u0027 as separate words are excluded"],"expected_result":"Search returns only results containing the exact phrase \u0027building permit\u0027 as specified in the query syntax. Results are displayed within 500ms for queries matching up to 100,000 documents.","preconditions":"User is authenticated with access to search functionality. Test data includes applications with \u0027building permit\u0027 as exact phrase and applications with \u0027building\u0027 and \u0027permit\u0027 as separate words.","content":"---\nid: TC-101\npriority: medium\ntags:\n  - search\n  - query-syntax\n  - exact-match\ncomponent: search-query\nrequirements: [REQ-029]\nsource_refs:\n  - docs/spectra-test-docs/docs/search/search-filtering.md#Search-Query-Syntax\nestimated_duration: 4m\nautomated_by:\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/LoginTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Payments/CardPaymentTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Payments/CardPaymentTests.cs\n---\n\n# Search using exact phrase syntax with quotes\n\n## Preconditions\n\nUser is authenticated with access to search functionality. Test data includes applications with \u0027building permit\u0027 as exact phrase and applications with \u0027building\u0027 and \u0027permit\u0027 as separate words.\n\n## Steps\n\n1. Navigate to the global search bar\n2. Enter search query: \u0022building permit\u0022 (with quotes)\n3. Press Enter to execute search\n4. Review search results on the results page\n5. Verify that only results containing the exact phrase \u0027building permit\u0027 are returned\n6. Verify that results with \u0027building\u0027 and \u0027permit\u0027 as separate words are excluded\n\n## Expected Result\n\nSearch returns only results containing the exact phrase \u0027building permit\u0027 as specified in the query syntax. Results are displayed within 500ms for queries matching up to 100,000 documents.\n\n## Test Data\n\nQuery: \u0022building permit\u0022\n"},{"id":"TC-102","suite":"search","title":"Search with invalid field-specific filter syntax","file":"TC-102.md","priority":"medium","tags":["search","error-handling","negative-test"],"component":"search-query","source_refs":["docs/spectra-test-docs/docs/search/search-filtering.md#Search-Query-Syntax"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Navigate to the global search bar","Enter search query with invalid field name: \u0027invalidfield:pending\u0027","Press Enter to execute search","Observe the search behavior and results","Note any error messages or how the system handles the invalid syntax"],"expected_result":"System handles invalid field-specific filter gracefully. Either treats the entire query as plain text search (searching for literal \u0027invalidfield:pending\u0027) or displays a helpful error message indicating the field is not recognized. Valid field-specific filters are: status, service, region, clerk, date, amount, egn, ref.","preconditions":"User is authenticated and has access to search functionality","content":"---\nid: TC-102\npriority: medium\ntags:\n  - search\n  - error-handling\n  - negative-test\ncomponent: search-query\nrequirements: [REQ-029]\nsource_refs:\n  - docs/spectra-test-docs/docs/search/search-filtering.md#Search-Query-Syntax\nestimated_duration: 3m\nautomated_by:\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/LoginTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/LoginTests.cs\n---\n\n# Search with invalid field-specific filter syntax\n\n## Preconditions\n\nUser is authenticated and has access to search functionality\n\n## Steps\n\n1. Navigate to the global search bar\n2. Enter search query with invalid field name: \u0027invalidfield:pending\u0027\n3. Press Enter to execute search\n4. Observe the search behavior and results\n5. Note any error messages or how the system handles the invalid syntax\n\n## Expected Result\n\nSystem handles invalid field-specific filter gracefully. Either treats the entire query as plain text search (searching for literal \u0027invalidfield:pending\u0027) or displays a helpful error message indicating the field is not recognized. Valid field-specific filters are: status, service, region, clerk, date, amount, egn, ref.\n\n## Test Data\n\nQuery: \u0027invalidfield:pending\u0027\n"},{"id":"TC-103","suite":"search","title":"Advanced filters with AND logic across multiple filter types","file":"TC-103.md","priority":"high","tags":["search","filters","advanced-search"],"component":"advanced-filters","source_refs":["docs/spectra-test-docs/docs/search/search-filtering.md#Advanced-Filters-Panel"],"has_automation":false,"steps":["Navigate to search results page","Open the advanced filters panel on the left side","Select \u0027Pending\u0027 from Status multi-select checkboxes","Select a specific service type from the Service Type dropdown","Set Date Range using date pickers: from \u00272026-01-01\u0027 to \u00272026-03-31\u0027","Observe that results update immediately without clicking Apply button","Verify active filters are shown as chips above results","Verify URL query parameters reflect current filters"],"expected_result":"Filters combine with AND logic (all conditions must be met). Results show only applications that are Pending AND match the selected service type AND fall within the date range. Results update within 300ms. Active filters appear as removable chips. URL is updated for bookmarking/sharing.","preconditions":"User is authenticated and on the search results page with the advanced filters panel visible. Test data includes applications with various statuses, service types, and date ranges.","content":"---\nid: TC-103\npriority: high\ntags:\n  - search\n  - filters\n  - advanced-search\ncomponent: advanced-filters\nrequirements: [REQ-031]\nsource_refs:\n  - docs/spectra-test-docs/docs/search/search-filtering.md#Advanced-Filters-Panel\nestimated_duration: 5m\n---\n\n# Advanced filters with AND logic across multiple filter types\n\n## Preconditions\n\nUser is authenticated and on the search results page with the advanced filters panel visible. Test data includes applications with various statuses, service types, and date ranges.\n\n## Steps\n\n1. Navigate to search results page\n2. Open the advanced filters panel on the left side\n3. Select \u0027Pending\u0027 from Status multi-select checkboxes\n4. Select a specific service type from the Service Type dropdown\n5. Set Date Range using date pickers: from \u00272026-01-01\u0027 to \u00272026-03-31\u0027\n6. Observe that results update immediately without clicking Apply button\n7. Verify active filters are shown as chips above results\n8. Verify URL query parameters reflect current filters\n\n## Expected Result\n\nFilters combine with AND logic (all conditions must be met). Results show only applications that are Pending AND match the selected service type AND fall within the date range. Results update within 300ms. Active filters appear as removable chips. URL is updated for bookmarking/sharing.\n\n## Test Data\n\nStatus: Pending, Service Type: Building Permit, Date Range: 2026-01-01 to 2026-03-31\n"},{"id":"TC-104","suite":"search","title":"Saved search creation exceeding maximum limit","file":"TC-104.md","priority":"low","tags":["search","saved-searches","negative-test","limits"],"component":"saved-searches","source_refs":["docs/spectra-test-docs/docs/search/search-filtering.md#Saved-Searches"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Payments\\RefundTests.cs","has_automation":true,"steps":["Verify user already has 20 saved searches","Execute a new search query with specific filters","Click \u0027Save this search\u0027 button on the results page","Attempt to enter a name for the new saved search","Observe system behavior when trying to save the 21st search"],"expected_result":"System prevents saving more than 20 searches per user. An error message is displayed indicating the maximum limit has been reached. User is prompted to delete an existing saved search before creating a new one.","preconditions":"User is authenticated and already has 20 saved searches (maximum limit). User is on a search results page.","content":"---\nid: TC-104\npriority: low\ntags:\n  - search\n  - saved-searches\n  - negative-test\n  - limits\ncomponent: saved-searches\nrequirements: [REQ-032]\nsource_refs:\n  - docs/spectra-test-docs/docs/search/search-filtering.md#Saved-Searches\nestimated_duration: 4m\nautomated_by:\r\n  - ../test_app_automation/TestAppAutomation/Tests/Payments/RefundTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Payments/RefundTests.cs\n---\n\n# Saved search creation exceeding maximum limit\n\n## Preconditions\n\nUser is authenticated and already has 20 saved searches (maximum limit). User is on a search results page.\n\n## Steps\n\n1. Verify user already has 20 saved searches\n2. Execute a new search query with specific filters\n3. Click \u0027Save this search\u0027 button on the results page\n4. Attempt to enter a name for the new saved search\n5. Observe system behavior when trying to save the 21st search\n\n## Expected Result\n\nSystem prevents saving more than 20 searches per user. An error message is displayed indicating the maximum limit has been reached. User is prompted to delete an existing saved search before creating a new one.\n\n## Test Data\n\nUser with 20 existing saved searches, attempting to save search: \u0027status:pending region:Sofia\u0027\n"},{"id":"TC-105","suite":"search","title":"Search results filtered by user permissions for clerk role","file":"TC-105.md","priority":"high","tags":["search","permissions","security","rbac"],"component":"permission-filtering","source_refs":["docs/spectra-test-docs/docs/search/search-filtering.md#Permission-Based-Filtering"],"automated_by":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","has_automation":true,"steps":["Log in as a user with Clerk role","Navigate to global search","Execute a broad search query that would match applications across multiple departments","Review the search results","Verify that only applications assigned to the clerk or in their department queue are visible","Verify that applications from other departments are not visible in results","Check that result count reflects only permitted applications"],"expected_result":"Search results are automatically filtered by clerk permissions. Only applications assigned to the clerk or in their department queue are displayed. Applications from other departments are excluded. Result counts are accurate and reflect permission-filtered results. Filtering happens at query level, not post-query.","preconditions":"User is authenticated as a Clerk role. Test data includes applications assigned to the clerk, applications in their department queue, and applications outside their department.","content":"---\nid: TC-105\npriority: high\ntags:\n  - search\n  - permissions\n  - security\n  - rbac\ncomponent: permission-filtering\nrequirements: [REQ-030]\nsource_refs:\n  - docs/spectra-test-docs/docs/search/search-filtering.md#Permission-Based-Filtering\nestimated_duration: 6m\nautomated_by:\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/LoginTests.cs\r\n  - ../test_app_automation/TestAppAutomation/Tests/Authentication/LoginTests.cs\n---\n\n# Search results filtered by user permissions for clerk role\n\n## Preconditions\n\nUser is authenticated as a Clerk role. Test data includes applications assigned to the clerk, applications in their department queue, and applications outside their department.\n\n## Steps\n\n1. Log in as a user with Clerk role\n2. Navigate to global search\n3. Execute a broad search query that would match applications across multiple departments\n4. Review the search results\n5. Verify that only applications assigned to the clerk or in their department queue are visible\n6. Verify that applications from other departments are not visible in results\n7. Check that result count reflects only permitted applications\n\n## Expected Result\n\nSearch results are automatically filtered by clerk permissions. Only applications assigned to the clerk or in their department queue are displayed. Applications from other departments are excluded. Result counts are accurate and reflect permission-filtered results. Filtering happens at query level, not post-query.\n\n## Test Data\n\nClerk user: clerk@example.com, Department: Sofia Regional Office\n"}],"coverage":{"nodes":[{"id":"auto:___test_app_automation_TestAppAutomation_Tests_Authentication_LoginTests_cs","type":"automation","name":"LoginTests.cs","path":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\LoginTests.cs","status":"covered"},{"id":"auto:___test_app_automation_TestAppAutomation_Tests_Authentication_MfaTests_cs","type":"automation","name":"MfaTests.cs","path":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\MfaTests.cs","status":"covered"},{"id":"auto:___test_app_automation_TestAppAutomation_Tests_Authentication_SessionTests_cs","type":"automation","name":"SessionTests.cs","path":"..\\test_app_automation\\TestAppAutomation\\Tests\\Authentication\\SessionTests.cs","status":"covered"},{"id":"auto:___test_app_automation_TestAppAutomation_Tests_Payments_RefundTests_cs","type":"automation","name":"RefundTests.cs","path":"..\\test_app_automation\\TestAppAutomation\\Tests\\Payments\\RefundTests.cs","status":"covered"},{"id":"doc:docs_spectra-test-docs_docs_authentication_authentication_md#Account-Lockout","type":"document","name":"authentication.md#Account-Lockout","path":"docs/spectra-test-docs/docs/authentication/authentication.md#Account-Lockout","status":"partial"},{"id":"doc:docs_spectra-test-docs_docs_authentication_authentication_md#Administrator-Reset","type":"document","name":"authentication.md#Administrator-Reset","path":"docs/spectra-test-docs/docs/authentication/authentication.md#Administrator-Reset","status":"partial"},{"id":"doc:docs_spectra-test-docs_docs_authentication_authentication_md#Login-Methods","type":"document","name":"authentication.md#Login-Methods","path":"docs/spectra-test-docs/docs/authentication/authentication.md#Login-Methods","status":"covered"},{"id":"doc:docs_spectra-test-docs_docs_authentication_authentication_md#Multi-Factor-Authentication-MFA","type":"document","name":"authentication.md#Multi-Factor-Authentication-MFA","path":"docs/spectra-test-docs/docs/authentication/authentication
